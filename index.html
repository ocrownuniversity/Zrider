<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Zrider — Bike Rides in Ikeja</title>
<meta name="description" content="Zrider: fast, affordable motorcycle rides across Ikeja LGA, Lagos.">
<meta name="theme-color" content="#0B6E4F">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
:root{
  --green-900:#06402B; --green-700:#0B6E4F; --green-600:#13875F; --green-100:#E3F3EC;
  --amber-500:#FFB100; --amber-600:#E69E00; --amber-100:#FFF3D6;
  --ink-900:#11181C; --ink-700:#33403C; --ink-400:#6B7976; --ink-200:#C7D0CD;
  --surface-0:#FFFFFF; --surface-1:#F6F7F5; --surface-2:#ECEFEC;
  --red-600:#E64539; --red-100:#FCE7E5;
  --radius-s:10px; --radius-m:16px; --radius-l:24px;
  --shadow-card:0 1px 2px rgba(17,24,28,.04), 0 8px 24px rgba(17,24,28,.08);
  --shadow-pop:0 12px 32px rgba(17,24,28,.18);
  --font-display:'Sora',system-ui,sans-serif; --font-body:'Inter',system-ui,sans-serif; --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--ink-900);}
body{font-family:var(--font-body);color:var(--ink-900);-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;}
button{font-family:inherit;} input,select,textarea{font-family:inherit;}
::selection{background:var(--amber-100);} a{color:inherit;}
.hidden{display:none !important;} .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}

#zr-root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--surface-1);position:relative;overflow-x:hidden;display:flex;flex-direction:column;}
@media (min-width:481px){body{display:flex;justify-content:center;background:#0a1210;} #zr-root{box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 30px 80px rgba(0,0,0,.5);}}

.route-stripe{height:4px;width:100%;background:repeating-linear-gradient(90deg, var(--amber-500) 0 14px, transparent 14px 24px);border-radius:2px;}
.route-stripe.vert{width:4px;height:100%;background:repeating-linear-gradient(180deg, var(--amber-500) 0 14px, transparent 14px 24px);}

h1,h2,h3,.zr-display{font-family:var(--font-display);font-weight:700;color:var(--ink-900);margin:0;letter-spacing:-.01em;}
.zr-eyebrow{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--green-700);font-weight:700;}
p{margin:0;line-height:1.5;} .muted{color:var(--ink-400);font-size:13px;}
.meter{font-family:var(--font-mono);font-weight:700;letter-spacing:.02em;font-variant-numeric:tabular-nums;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius-s);font-family:var(--font-body);font-weight:600;font-size:15px;padding:14px 18px;cursor:pointer;transition:transform .12s ease, opacity .12s ease;width:100%;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--green-700);color:#fff;} .btn-primary:hover{background:var(--green-600);}
.btn-amber{background:var(--amber-500);color:var(--ink-900);} .btn-amber:hover{background:var(--amber-600);}
.btn-outline{background:transparent;color:var(--green-700);border:1.5px solid var(--green-700);}
.btn-ghost{background:transparent;color:var(--ink-700);}
.btn-danger{background:var(--red-600);color:#fff;}
.btn-sm{padding:9px 14px;font-size:13px;width:auto;}
.btn-block-row{display:flex;gap:10px;}
.btn[disabled]{opacity:.5;pointer-events:none;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-700);margin-bottom:6px;}
.field input, .field select, .field textarea{width:100%;padding:13px 14px;border-radius:var(--radius-s);border:1.5px solid var(--surface-2);background:var(--surface-0);font-size:15px;color:var(--ink-900);outline:none;transition:border-color .15s;}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--green-700);}
.field .hint{font-size:11px;color:var(--ink-400);margin-top:4px;}

.card{background:var(--surface-0);border-radius:var(--radius-m);padding:16px;box-shadow:var(--shadow-card);}
.card + .card{margin-top:12px;}

.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.pill-green{background:var(--green-100);color:var(--green-700);}
.pill-amber{background:var(--amber-100);color:var(--amber-600);}
.pill-red{background:var(--red-100);color:var(--red-600);}
.pill-grey{background:var(--surface-2);color:var(--ink-400);}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface-0);position:sticky;top:0;z-index:30;border-bottom:1px solid var(--surface-2);}
.topbar .brand{display:flex;align-items:center;gap:8px;}
.brand-mark{width:30px;height:30px;border-radius:8px;background:var(--green-700);display:flex;align-items:center;justify-content:center;color:var(--amber-500);font-family:var(--font-display);font-weight:800;font-size:15px;}

.bottomnav{position:sticky;bottom:0;z-index:30;display:flex;background:var(--surface-0);border-top:1px solid var(--surface-2);padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:8px 2px;color:var(--ink-400);font-size:10.5px;font-weight:600;cursor:pointer;border-radius:10px;}
.bottomnav button.active{color:var(--green-700);}
.bottomnav button svg{width:21px;height:21px;}

.screen{flex:1;display:flex;flex-direction:column;min-height:0;}
.screen-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:24px;}

.map-wrap{position:relative;width:100%;height:260px;background:var(--surface-2);overflow:hidden;}
.map-wrap .gmap{width:100%;height:100%;}
.map-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--ink-400);font-size:12px;text-align:center;padding:20px;background:repeating-linear-gradient(135deg, var(--surface-2) 0 12px, var(--surface-1) 12px 24px);}

.sheet{background:var(--surface-0);border-radius:var(--radius-l) var(--radius-l) 0 0;margin-top:-20px;position:relative;z-index:2;box-shadow:0 -6px 24px rgba(17,24,28,.08);padding:18px 16px 16px;flex:1;}
.sheet-handle{width:36px;height:4px;background:var(--surface-2);border-radius:2px;margin:0 auto 14px;}

.auth-screen{min-height:100vh;display:flex;flex-direction:column;background:var(--green-900);color:#fff;}
.auth-hero{padding:48px 24px 24px;}
.auth-hero .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.auth-hero .brand-mark{background:var(--amber-500);color:var(--green-900);}
.auth-hero h1{color:#fff;font-size:30px;line-height:1.15;}
.auth-hero p{color:rgba(255,255,255,.75);margin-top:8px;font-size:14px;}
.auth-card{background:var(--surface-0);border-radius:var(--radius-l) var(--radius-l) 0 0;flex:1;padding:24px;margin-top:20px;}
.role-toggle{display:flex;gap:8px;background:var(--surface-2);padding:4px;border-radius:var(--radius-s);margin-bottom:18px;}
.role-toggle button{flex:1;border:none;background:none;padding:10px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink-700);cursor:pointer;}
.role-toggle button.active{background:var(--surface-0);color:var(--green-700);box-shadow:var(--shadow-card);}
.tab-link{text-align:center;font-size:13px;color:var(--ink-400);margin-top:16px;}
.tab-link b{color:var(--green-700);cursor:pointer;}

.overlay{position:fixed;inset:0;background:rgba(17,24,28,.55);z-index:90;display:flex;align-items:flex-end;justify-content:center;}
@media (min-width:481px){.overlay{justify-content:center;}}
.modal{background:var(--surface-0);width:100%;max-width:480px;border-radius:var(--radius-l) var(--radius-l) 0 0;padding:20px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-pop);animation:slideup .22s ease;}
@keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-close{background:var(--surface-2);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--ink-700);}

#zr-toasts{position:fixed;top:14px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none;}
.toast{background:var(--ink-900);color:#fff;font-size:13px;font-weight:500;padding:10px 16px;border-radius:999px;box-shadow:var(--shadow-pop);max-width:88%;text-align:center;}
.toast.err{background:var(--red-600);} .toast.ok{background:var(--green-700);}

.row{display:flex;align-items:center;justify-content:space-between;} .row.gap{gap:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--green-100);color:var(--green-700);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display);overflow:hidden;flex-shrink:0;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.divider{height:1px;background:var(--surface-2);margin:14px 0;}
.empty-state{text-align:center;padding:40px 16px;color:var(--ink-400);}
.empty-state svg{width:48px;height:48px;color:var(--ink-200);margin-bottom:10px;}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
.spinner.dark{border-color:var(--surface-2);border-top-color:var(--green-700);}
@keyframes spin{to{transform:rotate(360deg);}}
.skel{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-1) 37%,var(--surface-2) 63%);background-size:400% 100%;animation:skel 1.4s ease infinite;border-radius:8px;}
@keyframes skel{0%{background-position:100% 50%}100%{background-position:0 50%}}
.badge-verify{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--green-700);}
.tabs-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.tabs-row::-webkit-scrollbar{display:none;}
.tabs-row button{flex-shrink:0;border:1.5px solid var(--surface-2);background:var(--surface-0);padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--ink-700);cursor:pointer;}
.tabs-row button.active{background:var(--green-700);color:#fff;border-color:var(--green-700);}
.stat-box{background:var(--green-900);border-radius:var(--radius-m);padding:18px;color:#fff;}
.stat-box .meter{font-size:28px;color:var(--amber-500);}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-700);}
.fab{position:absolute;bottom:18px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--red-600);color:#fff;border:none;box-shadow:var(--shadow-pop);font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;}
.list-item + .list-item{border-top:1px solid var(--surface-2);}
.doc-row{display:flex;align-items:center;justify-content:space-between;border:1.5px dashed var(--surface-2);border-radius:var(--radius-s);padding:12px;margin-bottom:10px;}
.star-row{display:flex;gap:4px;}
.star-row svg{width:26px;height:26px;cursor:pointer;color:var(--surface-2);}
.star-row svg.on{color:var(--amber-500);}
</style>
</head>
<body>
<div id="zr-toasts"></div>
<div id="zr-root">
  <!-- Screens injected below -->
</div>

<!-- ================= TEMPLATES (cloned into #zr-root by JS) ================= -->
<template id="tpl-loading">
  <div class="auth-screen" style="align-items:center;justify-content:center;">
    <div class="brand-mark" style="width:56px;height:56px;font-size:26px;background:var(--amber-500);color:var(--green-900);">Z</div>
    <p style="color:rgba(255,255,255,.7);margin-top:14px;font-size:13px;">Loading Zrider…</p>
  </div>
</template>

<!-- ===== AUTH ===== -->
<template id="tpl-auth">
  <div class="auth-screen">
    <div class="auth-hero">
      <div class="brand-row">
        <div class="brand-mark">Z</div>
        <span class="zr-eyebrow" style="color:var(--amber-500);">ZRIDER</span>
      </div>
      <h1>Bike rides across Ikeja, on demand.</h1>
      <p>Quick okada pickups, fair meter pricing, only within Ikeja LGA.</p>
    </div>
    <div class="auth-card">
      <div class="role-toggle" id="auth-role-toggle">
        <button data-role="passenger" class="active">Passenger</button>
        <button data-role="rider">Rider</button>
      </div>

      <div id="auth-mode-login">
        <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@email.com" autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="btn btn-primary" id="btn-login">Log in</button>
        <p class="tab-link">New to Zrider? <b id="go-register">Create an account</b></p>
      </div>

      <div id="auth-mode-register" class="hidden">
        <div class="field"><label>Full name <span style="color:var(--red-600);">*</span></label><input type="text" id="reg-name" placeholder="Ridwan Opeyemi"></div>
        <div class="field"><label>Email <span style="color:var(--red-600);">*</span></label><input type="email" id="reg-email" placeholder="you@email.com"></div>
        <div class="field"><label>Phone number <span style="color:var(--red-600);">*</span></label><input type="tel" id="reg-phone" placeholder="080 000 0000"></div>
        <div class="field"><label>Password <span style="color:var(--red-600);">*</span></label><input type="password" id="reg-password" placeholder="Min. 6 characters"></div>
        <button class="btn btn-primary" id="btn-register">Create account</button>
        <p class="tab-link">Already have an account? <b id="go-login">Log in</b></p>
      </div>
      <p class="muted" id="auth-error" style="color:var(--red-600);margin-top:10px;text-align:center;"></p>
    </div>
  </div>
</template>

<!-- ===== RIDER VERIFICATION GATE (shown if rider profile incomplete / pending / rejected) ===== -->
<template id="tpl-rider-gate">
  <div class="screen" style="background:var(--surface-1);">
    <div class="topbar">
      <div class="brand"><div class="brand-mark">Z</div><strong>Zrider · Rider</strong></div>
      <button class="icon-btn" id="gate-logout">⎋</button>
    </div>
    <div class="screen-body" id="gate-body"><!-- filled by JS: onboarding form OR pending/rejected message --></div>
  </div>
</template>

<!-- ===== PASSENGER APP SHELL ===== -->
<template id="tpl-app-passenger">
  <div class="screen">
    <div class="topbar">
      <div class="brand"><div class="brand-mark">Z</div><strong>Zrider</strong></div>
      <div class="row gap">
        <button class="icon-btn" id="p-open-notifs">🔔</button>
        <div class="avatar" id="p-avatar">P</div>
      </div>
    </div>
    <div id="p-screen-home" class="screen-tab"></div>
    <div id="p-screen-history" class="screen-tab hidden"></div>
    <div id="p-screen-notifs" class="screen-tab hidden"></div>
    <div id="p-screen-profile" class="screen-tab hidden"></div>
    <div class="bottomnav" id="p-bottomnav">
      <button data-tab="home" class="active">🏠<span>Home</span></button>
      <button data-tab="history">🧾<span>Trips</span></button>
      <button data-tab="notifs">🔔<span>Alerts</span></button>
      <button data-tab="profile">👤<span>Profile</span></button>
    </div>
  </div>
</template>

<!-- Passenger HOME content -->
<template id="tpl-p-home">
  <div class="row" style="padding:14px 16px 0;">
    <div>
      <p class="muted" style="font-size:12px;" id="p-greeting-line">Good day</p>
      <h3 style="margin-top:2px;" id="p-greeting-name">—</h3>
    </div>
  </div>
  <div style="position:relative;margin-top:10px;">
    <div class="map-wrap">
      <div id="map-passenger" class="gmap"></div>
      <div class="map-fallback" id="map-passenger-fallback">📍 Map loads once a Google Maps API key is set in the code (see MAPS_API_KEY).</div>
    </div>
    <button class="fab" id="p-sos" title="Emergency">🆘<span>SOS</span></button>
  </div>
  <div class="sheet scroll" id="p-sheet"><!-- JS swaps: request form / searching / active ride / rate --></div>
</template>

<!-- Passenger ride request form (inside sheet) -->
<template id="tpl-p-request-form">
  <div class="sheet-handle"></div>
  <div class="zr-eyebrow">PLAN YOUR TRIP</div>
  <div class="field" style="margin-top:10px;"><label>Pickup</label><input type="text" id="p-pickup" placeholder="Use my location or search…"></div>
  <div class="field"><label>Destination</label><input type="text" id="p-destination" placeholder="Where to? (must be within Ikeja)"></div>
  <div class="row gap" style="margin-bottom:14px;flex-wrap:wrap;">
    <button class="btn btn-outline btn-sm" id="p-use-gps">📍 Use current location</button>
    <button class="btn btn-outline btn-sm hidden" id="p-quick-home">🏠 Home</button>
    <button class="btn btn-outline btn-sm hidden" id="p-quick-work">💼 Work</button>
  </div>
  <div class="card hidden" id="p-fare-card">
    <div class="row"><span class="muted">Distance</span><span class="meter" id="p-fare-distance">—</span></div>
    <div class="row" style="margin-top:6px;"><span class="muted">Est. trip time</span><span class="meter" id="p-fare-time">—</span></div>
    <div class="divider"></div>
    <div class="row" style="font-size:12.5px;"><span class="muted">Base fare</span><span class="meter" id="p-fare-base">—</span></div>
    <div class="row" style="margin-top:5px;font-size:12.5px;"><span class="muted">Distance charge</span><span class="meter" id="p-fare-distcharge">—</span></div>
    <div class="row" style="margin-top:5px;font-size:12.5px;"><span class="muted">Time charge</span><span class="meter" id="p-fare-timecharge">—</span></div>
    <div class="divider"></div>
    <div class="row"><span class="muted">Total fare</span><span class="meter" id="p-fare-amount" style="font-size:20px;color:var(--green-700);">—</span></div>
    <div class="route-stripe" style="margin:12px 0;"></div>
    <div class="field" style="margin-bottom:8px;"><label>Pay with</label>
      <select id="p-pay-method"><option value="cash">Cash to rider</option><option value="card">Card / Bank (Paystack)</option></select>
    </div>
    <button class="btn btn-amber" id="p-request-ride">Request bike</button>
  </div>
  <p class="muted" id="p-geofence-warning" style="color:var(--red-600);margin-top:10px;"></p>
</template>

<!-- Passenger searching state -->
<template id="tpl-p-searching">
  <div class="sheet-handle"></div>
  <div style="text-align:center;padding:18px 0;">
    <span class="spinner dark"></span>
    <h3 style="margin-top:14px;">Finding a rider near you…</h3>
    <p class="muted" style="margin-top:6px;">Matching with online riders in Ikeja</p>
    <button class="btn btn-ghost" id="p-cancel-search" style="margin-top:18px;color:var(--red-600);">Cancel request</button>
  </div>
</template>

<!-- Passenger active ride card -->
<template id="tpl-p-active-ride">
  <div class="sheet-handle"></div>
  <div class="row"><span class="pill pill-amber" id="p-ride-status-pill"><span class="pill-dot"></span>STATUS</span><span class="meter" id="p-ride-fare">₦0</span></div>
  <div class="card" style="margin-top:12px;">
    <div class="row gap">
      <div class="avatar" id="p-rider-avatar">R</div>
      <div style="flex:1;">
        <strong id="p-rider-name">—</strong>
        <p class="muted" id="p-rider-bike">—</p>
      </div>
      <button class="icon-btn" id="p-call-rider">📞</button>
      <button class="icon-btn" id="p-chat-rider">💬</button>
    </div>
    <div class="divider"></div>
    <div class="row" style="margin-bottom:6px;"><span class="muted">Pickup</span><span style="font-size:12.5px;text-align:right;max-width:60%;" id="p-route-pickup">—</span></div>
    <div class="row"><span class="muted">Destination</span><span style="font-size:12.5px;text-align:right;max-width:60%;" id="p-route-dest">—</span></div>
  </div>
  <div class="btn-block-row" style="margin-top:12px;">
    <button class="btn btn-ghost" id="p-report-issue" style="font-size:13px;">Report an issue</button>
    <button class="btn btn-outline" id="p-cancel-ride" style="color:var(--red-600);border-color:var(--red-600);">Cancel ride</button>
  </div>
</template>

<!-- Passenger rate rider -->
<template id="tpl-p-rate">
  <div class="sheet-handle"></div>
  <div class="card" style="margin-bottom:16px;">
    <div class="zr-eyebrow">TRIP RECEIPT</div>

// ---------- GEO / FARE ----------
function toRad(d){ return d * Math.PI / 180; }
function haversineKm(lat1,lng1,lat2,lng2){
  const R = 6371;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function isInServiceArea(lat,lng){
  if(lat==null || lng==null) return false;
  return haversineKm(lat,lng,serviceArea.lat,serviceArea.lng) <= serviceArea.radiusKm;
}
function computeFare(distanceKm){
  return computeFareBreakdown(distanceKm).total;
}
function computeFareBreakdown(distanceKm){
  const r = fareRules;
  const estMinutes = distanceKm * 3.2;
  const distCharge = distanceKm * r.perKm;
  const timeCharge = estMinutes * r.perMin;
  let total = r.baseFare + distCharge + timeCharge;
  total = Math.max(total, r.minFare);
  total = Math.round(total/10)*10;
  return { base: Math.round(r.baseFare), distCharge: Math.round(distCharge), timeCharge: Math.round(timeCharge), total, estMinutes: Math.round(estMinutes) };
}
function getGreeting(){

}
function getCurrentPosition(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){ reject(new Error('Geolocation not supported on this device.')); return; }

      pos => resolve({lat:pos.coords.latitude, lng:pos.coords.longitude}),
      err => reject(err),
      { enableHighAccuracy:true, timeout:10000 }
    );
  });
}

// ---------- GOOGLE MAPS (optional, graceful fallback) ----------
function loadGoogleMaps(){
  if(!MAPS_API_KEY) return Promise.resolve(false);
  if(mapsLoaded) return Promise.resolve(true);
  if(mapsLoadingPromise) return mapsLoadingPromise;
  mapsLoadingPromise = new Promise((resolve)=>{
    window.__zrMapsReady = () => { mapsLoaded = true; resolve(true); };
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_API_KEY}&libraries=places&callback=__zrMapsReady`;
    s.async = true;
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
  return mapsLoadingPromise;
}
function renderMapInto(elId, fallbackId, center){
  if(MAPS_API_KEY){
    loadGoogleMaps().then(ok=>{
      if(ok && window.google){
        const el = $(elId);
        if(!el) return;
        const fb = $(fallbackId); if(fb) fb.style.display = 'none';
        const map = new google.maps.Map(el, { center: center || {lat:serviceArea.lat,lng:serviceArea.lng}, zoom: 14, disableDefaultUI:true, zoomControl:true });
        new google.maps.Circle({
          strokeColor:'#0B6E4F', strokeOpacity:0.6, strokeWeight:2,
          fillColor:'#0B6E4F', fillOpacity:0.08,
          map, center:{lat:serviceArea.lat,lng:serviceArea.lng}, radius: serviceArea.radiusKm*1000
        });
        if(center){ new google.maps.Marker({ position: center, map, title:'You' }); }
      } else {
        renderFreeMapEmbed(elId, fallbackId, center);
      }
    });
  } else {
    renderFreeMapEmbed(elId, fallbackId, center);
  }
}
// Free Google Maps embed — no API key, no billing, no Google Cloud setup.
// Uses Google's longstanding public iframe endpoint (stable since ~2014).
// Tradeoff vs the full JS SDK above: no custom overlays (geofence circle),
// no live-updating markers, no in-page Places autocomplete — just a real,
// pannable/zoomable Google map centered on the given point.
function renderFreeMapEmbed(elId, fallbackId, center){
  const el = $(elId);
  if(!el) return;
  const fb = $(fallbackId); if(fb) fb.style.display = 'none';
  const point = center || { lat: serviceArea.lat, lng: serviceArea.lng };
  const src = `https://maps.google.com/maps?q=${point.lat},${point.lng}&z=14&output=embed`;
  el.innerHTML = `<iframe src="${src}" style="width:100%;height:100%;border:0;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
}
function attachAutocomplete(inputEl, onPlace){
  loadGoogleMaps().then(ok=>{
    if(!ok || !window.google || !inputEl) return;
    const ac = new google.maps.places.Autocomplete(inputEl, {
      componentRestrictions:{country:'ng'},
      fields:['geometry','formatted_address','name']
    });
    ac.addListener('place_changed', ()=>{
      const place = ac.getPlace();
      if(place && place.geometry){
        onPlace({
          lat: place.geometry.location.lat(),
          lng: place.geometry.location.lng(),
          address: place.formatted_address || place.name || inputEl.value
        });
      }
    });
  });
}

async function routeUser(user){
  let ref = db.collection('users').doc(user.uid);
  let snap;
  try { snap = await ref.get(); } catch(e){ toast('Connection error. Retrying…','err'); setTimeout(()=>routeUser(user),1500); return; }

  if(!snap.exists){
    // Safety net: doc wasn't created (e.g. race condition) — create a minimal one now.
    const fallbackData = {
      name: user.displayName || user.email.split('@')[0],
      email: user.email, phone:'', role: pendingRequestRoleHint || 'passenger',
      rating:5, ratingCount:0, photoURL:'', createdAt: FieldValue.serverTimestamp()
    };
    await ref.set(fallbackData);
    snap = await ref.get();
  }

  let data = snap.data();

  if(data.suspended){
    await auth.signOut();
    toast('Your account has been suspended. Contact Zrider support.', 'err');
    renderAuth();
    return;
  }

  const isAdminEmail = user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
  if(isAdminEmail && data.role !== 'admin'){
    await ref.update({ role:'admin' });
    data.role = 'admin';
  }
  currentUserDoc = data;
  currentRole = data.role;

  if(currentRole === 'admin'){ renderAdminApp(); return; }

  if(currentRole === 'rider'){
    const rsnap = await db.collection('riders').doc(user.uid).get();
    riderDoc = rsnap.exists ? rsnap.data() : null;
    if(!riderDoc){
      await db.collection('riders').doc(user.uid).set({ status:'incomplete', online:false, walletBalance:0, totalEarned:0, totalTrips:0, createdAt: FieldValue.serverTimestamp() });
      riderDoc = { status:'incomplete', online:false, walletBalance:0, totalEarned:0, totalTrips:0 };
    }
    if(riderDoc.status === 'incomplete') renderRiderGate('onboard');
    else if(riderDoc.status === 'pending') renderRiderGate('pending');
    else if(riderDoc.status === 'rejected') renderRiderGate('rejected');
    else renderRiderApp();
    return;
  }

  renderPassengerApp();
}

function friendlyAuthError(e){
  const code = e && e.code || '';
  if(code.includes('email-already-in-use')) return 'That email is already registered. Try logging in.';
  if(code.includes('wrong-password') || code.includes('invalid-credential')) return 'Incorrect email or password.';
  if(code.includes('user-not-found')) return 'No account found with that email.';
  if(code.includes('invalid-email')) return 'That email address looks invalid.';
  if(code.includes('weak-password')) return 'Choose a stronger password (min. 6 characters).';
  if(code.includes('network')) return 'Network error — check your connection and try again.';
  return e && e.message ? e.message : 'Something went wrong. Please try again.';
}

  if(!licDocFile || !bikeDocFile){ $('ob-error').textContent = 'Please upload both required documents.'; return; }

  const btn = $('ob-submit'); const orig = btn.textContent;

    btn.disabled = false; btn.textContent = orig;
  }
}

// Compress + resize an image file in-browser and return a base64 data URL,
// small enough to store directly inside a Firestore document (1MB doc limit).
function fileToCompressedDataURL(file, maxDim, startQuality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file.'));
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = () => reject(new Error('Could not read image.'));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        let q = startQuality || 0.7;
        let dataUrl = canvas.toDataURL('image/jpeg', q);
        // Step quality down until the encoded string comfortably fits in a Firestore field.
        while(dataUrl.length > 320000 && q > 0.25){
          q -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', q);
        }
        resolve(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function pListenActiveRide(){
  const unsub = db.collection('rides')
    .where('passengerId','==', currentUser.uid)
    .where('passengerActive','==', true)
    .onSnapshot(snap => {
      if(snap.empty){
        activeRideId = null;
        if(pCurrentTab==='home') pRenderSheet('form');
        return;
      }
      const doc = snap.docs[0];
      activeRideId = doc.id;
      const ride = Object.assign({id:doc.id}, doc.data());
      if(pCurrentTab==='home'){
        if(ride.status === 'searching') pRenderSheet('searching', ride);
        else if(['accepted','arriving','ongoing'].includes(ride.status)) pRenderSheet('active', ride);
        else if(ride.status === 'completed' && !ride.passengerRated) pRenderSheet('rate', ride);
        else if(ride.status === 'cancelled') pRenderSheet('cancelled', ride);
        else pRenderSheet('form');
      }
    }, err => console.warn('ride listener error', err));
  activeListeners.push(unsub);
}

function pRenderSheet(state, ride){
  const sheet = $('p-sheet');
  if(!sheet) return;
  sheet.innerHTML = '';
  if(state === 'form') return pSheetForm(sheet);
  if(state === 'searching') return pSheetSearching(sheet, ride);
  if(state === 'active') return pSheetActive(sheet, ride);
  if(state === 'rate') return pSheetRate(sheet, ride);
  if(state === 'cancelled') return pSheetCancelled(sheet, ride);
}

function pUpdateFare(){
  const warnEl = $('p-geofence-warning');
  warnEl.textContent = '';
  if(!pPickup || !pDestination || !pDestination.address){ $('p-fare-card').classList.add('hidden'); return; }

  const pickupOk = isInServiceArea(pPickup.lat, pPickup.lng);
  let destOk;
  if(pDestination.lat != null){
    destOk = isInServiceArea(pDestination.lat, pDestination.lng);
  } else {
    // No geocoded coordinates available (Maps API key not set) — fall back to a name check.
    destOk = pDestination.address.toLowerCase().includes('ikeja');
  }

  if(!pickupOk){ warnEl.textContent = `Your pickup point looks outside ${serviceArea.name}. Zrider only operates within this area.`; $('p-fare-card').classList.add('hidden'); return; }
  if(!destOk){ warnEl.textContent = `Destination must be within ${serviceArea.name}. Zrider doesn't operate outside this zone yet.`; $('p-fare-card').classList.add('hidden'); return; }

  const distKm = pDestination.lat != null
    ? haversineKm(pPickup.lat, pPickup.lng, pDestination.lat, pDestination.lng)
    : 3.5; // reasonable default estimate when exact destination coords are unavailable
  const breakdown = computeFareBreakdown(distKm);
  $('p-fare-distance').textContent = fmtKm(distKm);
  $('p-fare-time').textContent = '~' + breakdown.estMinutes + ' min';
  $('p-fare-base').textContent = fmtNaira(breakdown.base);
  $('p-fare-distcharge').textContent = fmtNaira(breakdown.distCharge);
  $('p-fare-timecharge').textContent = fmtNaira(breakdown.timeCharge);
  $('p-fare-amount').textContent = fmtNaira(breakdown.total);
  $('p-fare-card').classList.remove('hidden');
  $('p-fare-card').dataset.distKm = distKm;
  $('p-fare-card').dataset.fare = breakdown.total;
}

async function pRequestRide(){
  if(!pPickup || !pDestination) { toast('Set your pickup and destination first.', 'err'); return; }
  const btn = $('p-request-ride'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const distKm = parseFloat($('p-fare-card').dataset.distKm);
  const fare = parseFloat($('p-fare-card').dataset.fare);
  const paymentMethod = $('p-pay-method').value;

  try{
    const rideRef = await db.collection('rides').add({
      passengerId: currentUser.uid,
      passengerName: currentUserDoc.name,
      passengerPhone: currentUserDoc.phone || '',
      riderId: null,
      pickup: pPickup,
      destination: pDestination,
      distanceKm: distKm,
      fare: fare,
      paymentMethod,
      paymentStatus: paymentMethod === 'cash' ? 'pending_cash' : 'pending_online',
      status: 'searching',
      passengerActive: true,
      riderActive: false,
      passengerRated: false,
      createdAt: FieldValue.serverTimestamp()
    });

    if(paymentMethod === 'card'){
      const ok = await collectPaystackPayment(fare, async (ref)=>{
        await db.collection('rides').doc(rideRef.id).update({ paymentStatus:'paid_online', paystackRef: ref });
      });
      if(!ok){ /* payment failed/cancelled — ride still created, passenger can pay cash on arrival or retry later */ }
    }
    toast('Looking for a nearby rider…', 'ok');
  }catch(e){
    toast('Could not request a ride. Try again.', 'err');
    btn.disabled = false; btn.textContent = 'Request bike';
  }
}

function loadNotificationsInto(containerId, uid, role){
  const list = $(containerId);
  list.innerHTML = '<div class="skel" style="height:50px;margin-bottom:10px;"></div>';
  Promise.all([
    db.collection('notifications').where('uid','==',uid).get(),
    db.collection('notifications').where('audience','==','all').get(),
    db.collection('notifications').where('audience','==',role).get()
  ]).then(([a,b,c])=>{
    const map = {};
    [...a.docs, ...b.docs, ...c.docs].forEach(d=> map[d.id] = Object.assign({id:d.id}, d.data()));
    let items = Object.values(map);
    items.sort((x,y)=> (y.createdAt?.toMillis?.()||0) - (x.createdAt?.toMillis?.()||0));
    if(items.length===0){ list.innerHTML = `<div class="empty-state"><div>🔔</div><p>No notifications yet</p></div>`; return; }
    list.innerHTML = '';
    items.forEach(n=>{
      const el = document.createElement('div');

      el.innerHTML = `<strong style="font-size:14px;">${n.title}</strong><p class="muted" style="margin-top:4px;">${n.message}</p><p class="muted" style="margin-top:6px;font-size:11px;">${timeAgo(n.createdAt)}</p>`;
      list.appendChild(el);
    });
  }).catch(()=>{ list.innerHTML = `<div class="empty-state"><p>Couldn't load notifications.</p></div>`; });
}

function openChat(rideId, otherName){
  activeChatRideId = rideId;
  openModal('tpl-modal-chat', (overlay)=>{

      .onSnapshot(snap=>{

      });

    function sendChat(){

    }
  });

const CANCEL_REASONS_PASSENGER = ['Rider is taking too long','Wrong pickup location','Found another ride','Changed my mind','Other'];

function alertNewRequest(){
  try{
    if(navigator.vibrate) navigator.vibrate([200,80,200]);
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1175].forEach((freq, i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.18, ctx.currentTime + i*0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.18 + 0.16);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime + i*0.18);
      osc.stop(ctx.currentTime + i*0.18 + 0.17);
    });
  }catch(e){ /* audio not available — silent fail is fine */ }
}

  $('r-today-trips').textContent = (riderDoc.todayTrips || 0).toString();
  document.querySelector('#r-sheet label').addEventListener('click', async (e)=>{
    e.preventDefault();
    const goingOnline = !toggle.checked;
    toggle.checked = goingOnline;
    paintToggle();
    await setRiderOnline(goingOnline);
  });
  function paintToggle(){
    $('r-toggle-track').style.background = toggle.checked ? 'var(--green-700)' : 'var(--surface-2)';
    $('r-toggle-knob').style.left = toggle.checked ? '25px' : '3px';
    $('r-status-label').textContent = toggle.checked ? "You're online" : "You're offline";
  }
  rListenIncomingRequests();
}

async function setRiderOnline(online){
  riderDoc.online = online;
  await db.collection('riders').doc(currentUser.uid).update({ online });
  if(online){
    if(navigator.geolocation){
      watchId = navigator.geolocation.watchPosition(pos=>{
        db.collection('riders').doc(currentUser.uid).update({ location: { lat:pos.coords.latitude, lng:pos.coords.longitude } }).catch(()=>{});
      }, ()=>{}, { enableHighAccuracy:true });
    }
    toast('You are online — looking for ride requests.', 'ok');
  } else {
    if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
    toast('You are now offline.');
  }
}

function rListenIncomingRequests(){
  const unsub = db.collection('rides').where('status','==','searching').where('riderId','==',null)
    .onSnapshot(snap=>{
      if(!riderDoc.online || activeRideId) return; // ignore while offline or mid-trip
      const candidates = snap.docs
        .map(d=>Object.assign({id:d.id}, d.data()))
        .filter(r=> !rDeclinedIds.has(r.id) && isInServiceArea(r.pickup.lat, r.pickup.lng));
      candidates.sort((a,b)=> (a.createdAt?.toMillis?.()||0) - (b.createdAt?.toMillis?.()||0));
      if(candidates.length === 0){ if(rCurrentTab==='home' && !activeRideId) rRenderSheetIdle(); return; }
      if(rCurrentTab==='home' && !activeRideId) rRenderSheetIncoming(candidates[0]);
    }, err => console.warn('incoming requests listener error', err));
  activeListeners.push(unsub);
}

function rRenderSheetIncoming(ride){
  if(lastAlertedRideId !== ride.id){ lastAlertedRideId = ride.id; alertNewRequest(); }
  const sheet = $('r-sheet');
  sheet.innerHTML = '';
  sheet.appendChild(clone('tpl-r-incoming'));
  $('r-req-fare').textContent = fmtNaira(ride.fare);
  $('r-req-avatar').textContent = initials(ride.passengerName);
  $('r-req-passenger').textContent = ride.passengerName;
  $('r-req-pickup').textContent = ride.pickup.address;
  $('r-req-dest').textContent = ride.destination.address;
  $('r-req-distance').textContent = fmtKm(ride.distanceKm);

  db.collection('users').doc(ride.passengerId).get().then(s=>{
    if(s.exists) $('r-req-rating').textContent = '★ ' + (s.data().rating||5).toFixed(1);
  });

  $('r-decline-ride').addEventListener('click', ()=>{ rDeclinedIds.add(ride.id); rRenderSheetIdle(); });
  $('r-accept-ride').addEventListener('click', async ()=>{
    $('r-accept-ride').disabled = true; $('r-accept-ride').innerHTML = '<span class="spinner"></span>';
    try{
      await db.runTransaction(async (tx)=>{
        const ref = db.collection('rides').doc(ride.id);
        const fresh = await tx.get(ref);
        if(!fresh.exists || fresh.data().riderId){ throw new Error('TAKEN'); }
        tx.update(ref, {
          riderId: currentUser.uid, riderName: currentUserDoc.name, riderPhone: currentUserDoc.phone || '',
          status: 'accepted', riderActive: true
        });
      });
      toast('Ride accepted! Head to pickup.', 'ok');
    }catch(e){
      toast('Sorry, that ride was already taken.', 'err');
      rDeclinedIds.add(ride.id); rRenderSheetIdle();
    }
  });
}

function rListenActiveRide(){
  const unsub = db.collection('rides')
    .where('riderId','==', currentUser.uid)
    .where('riderActive','==', true)
    .onSnapshot(snap=>{
      if(snap.empty){ activeRideId = null; if(rCurrentTab==='home') rRenderSheetIdle(); return; }
      const doc = snap.docs[0];
      activeRideId = doc.id;
      const ride = Object.assign({id:doc.id}, doc.data());
      if(rCurrentTab==='home') rRenderSheetActive(ride);
    }, err => console.warn('rider active ride listener error', err));
  activeListeners.push(unsub);
}

function rRenderSheetActive(ride){
  const sheet = $('r-sheet');
  sheet.innerHTML = '';
  sheet.appendChild(clone('tpl-r-active'));
  const statusMap = {
    accepted: ['pill-amber','HEADING TO PICKUP',"I've arrived"],
    arriving: ['pill-amber','ARRIVED AT PICKUP','Start trip'],
    ongoing: ['pill-green','TRIP IN PROGRESS','Complete trip']
  };
  const [cls,label,btnLabel] = statusMap[ride.status] || ['pill-grey','UPDATING','Continue'];
  const pill = $('r-trip-status-pill');
  pill.className = 'pill ' + cls;
  pill.innerHTML = `<span class="pill-dot"></span>${label}`;
  $('r-trip-fare').textContent = fmtNaira(ride.fare);
  $('r-trip-passenger').textContent = ride.passengerName;
  $('r-trip-avatar').textContent = initials(ride.passengerName);
  $('r-trip-phone').textContent = ride.passengerPhone || '';
  $('r-trip-pickup').textContent = ride.pickup.address;
  $('r-trip-dest').textContent = ride.destination.address;
  $('r-call-passenger').addEventListener('click', ()=> window.location.href = `tel:${ride.passengerPhone||''}`);
  $('r-chat-passenger').addEventListener('click', ()=> openChat(ride.id, ride.passengerName));

  $('r-advance-status').textContent = btnLabel;
  $('r-advance-status').addEventListener('click', async ()=>{
    if(ride.status === 'accepted'){ await db.collection('rides').doc(ride.id).update({ status:'arriving' }); }
    else if(ride.status === 'arriving'){ await db.collection('rides').doc(ride.id).update({ status:'ongoing', startedAt: FieldValue.serverTimestamp() }); }
    else if(ride.status === 'ongoing'){ await riderCompleteTrip(ride); }
  });
  $('r-cancel-trip').addEventListener('click', ()=>{
    promptCancelReason(CANCEL_REASONS_RIDER, async (reason)=>{
      await db.collection('rides').doc(ride.id).update({ status:'cancelled', cancelledBy:'rider', riderActive:false, cancelReason:reason });
      toast('Trip cancelled.');
    });
  });
  $('r-report-issue').addEventListener('click', ()=> openComplaintModal(ride.id));
}

async function riderCompleteTrip(ride){
  const earning = Math.round(ride.fare * (1 - (fareRules.commissionPct/100)));
  await db.collection('rides').doc(ride.id).update({ status:'completed', completedAt: FieldValue.serverTimestamp(), riderActive:false, riderEarning: earning });
  await db.collection('riders').doc(currentUser.uid).update({
    walletBalance: FieldValue.increment(earning),
    totalEarned: FieldValue.increment(earning),
    totalTrips: FieldValue.increment(1),
    todayEarnings: FieldValue.increment(earning),
    todayTrips: FieldValue.increment(1)
  });
  riderDoc.walletBalance = (riderDoc.walletBalance||0) + earning;
  toast(`Trip completed! You earned ${fmtNaira(earning)}`, 'ok');
  promptRating('Rate this passenger', async (rating)=>{
    await db.collection('rides').doc(ride.id).update({ passengerRatingByRider: rating });
    const uref = db.collection('users').doc(ride.passengerId);
    const usnap = await uref.get();
    const ud = usnap.data();
    const newCount = (ud.ratingCount||0)+1;
    const newRating = (((ud.rating||5)*(ud.ratingCount||0)) + rating)/newCount;
    await uref.update({ rating:newRating, ratingCount:newCount });
  });
}

function openWithdrawModal(){
  openModal('tpl-modal-withdraw', (overlay)=>{
    overlay.querySelector('#wd-balance').textContent = fmtNaira(riderDoc.walletBalance||0);
    overlay.querySelector('#wd-submit').addEventListener('click', async ()=>{
      const amount = parseFloat(overlay.querySelector('#wd-amount').value);

      if(!amount || amount <= 0){ toast('Enter a valid amount.', 'err'); return; }

      if(!account || !bank){ toast('Enter your bank details.', 'err'); return; }
      await db.collection('withdrawals').add({
        riderId: currentUser.uid, riderName: currentUserDoc.name, amount, account, bank,
        status:'pending', requestedAt: FieldValue.serverTimestamp()
      });
      await db.collection('riders').doc(currentUser.uid).update({ walletBalance: FieldValue.increment(-amount) });
      riderDoc.walletBalance -= amount;
      toast('Withdrawal request submitted.', 'ok');
      closeModal();

  });

// ---- Admin: simple 7-day inline bar chart (no chart library needed) ----
function renderSevenDayChart(completedRides){
  const box = $('a-chart-7day');
  if(!box) return;
  const days = [];
  for(let i=6; i>=0; i--){
    const d = new Date();
    d.setDate(d.getDate() - i);
    d.setHours(0,0,0,0);
    days.push({ date:d, label: d.toLocaleDateString('en-NG',{weekday:'short'}), count:0 });
  }
  completedRides.forEach(r=>{
    const t = r.completedAt?.toDate?.() || r.createdAt?.toDate?.();
    if(!t) return;
    const dayKey = new Date(t.getFullYear(), t.getMonth(), t.getDate()).getTime();
    const match = days.find(d => d.date.getTime() === dayKey);
    if(match) match.count++;
  });
  const max = Math.max(1, ...days.map(d=>d.count));
  box.innerHTML = `<div style="display:flex;align-items:flex-end;gap:8px;height:120px;">
    ${days.map(d => `
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;">
        <span class="meter" style="font-size:11px;margin-bottom:4px;">${d.count}</span>
        <div style="width:100%;border-radius:6px 6px 2px 2px;background:var(--green-700);height:${Math.max(4, (d.count/max)*84)}px;"></div>
        <span class="muted" style="font-size:10px;margin-top:6px;">${d.label}</span>
      </div>`).join('')}
  </div>`;
}

      el.querySelector('[data-toggle]').addEventListener('click', async ()=>{
        await db.collection('users').doc(p.uid).update({ suspended: !p.suspended });
        toast(p.suspended ? 'Passenger reactivated.':'Passenger suspended.', 'ok');
        aRenderPassengers();
      });
      list.appendChild(el);
    });
  }catch(e){ list.innerHTML = `<div class="empty-state"><p>Couldn't load passengers.</p></div>`; }
}

// ---- Trips ----
function aRenderTrips(){
  const c = $('a-screen-trips'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-trips'));
  $('a-trip-filter').addEventListener('click', (e)=>{
    const btn = e.target.closest('button[data-f]'); if(!btn) return;
    $('a-trip-filter').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); aTripFilter = btn.dataset.f;
    aLoadTripsList();
  });
  aTripFilter = 'all';
  aLoadTripsList();
}
async function aLoadTripsList(){
  const list = $('a-trips-list');
  list.innerHTML = '<div class="skel" style="height:70px;margin-top:12px;"></div>';
  try{
    const snap = await db.collection('rides').get();
    let rides = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    if(aTripFilter !== 'all'){
      if(aTripFilter === 'ongoing') rides = rides.filter(r=>['accepted','arriving','ongoing'].includes(r.status));
      else rides = rides.filter(r=>r.status===aTripFilter);
    }
    rides.sort((a,b)=> (b.createdAt?.toMillis?.()||0) - (a.createdAt?.toMillis?.()||0));
    if(rides.length===0){ list.innerHTML = `<div class="empty-state"><p>No trips here</p></div>`; return; }
    list.innerHTML = '';
    rides.slice(0,100).forEach(r=>{
      const el = document.createElement('div'); el.className='card';
      el.innerHTML = `<div class="row"><span class="pill pill-grey">${r.status.toUpperCase()}</span><span class="meter">${fmtNaira(r.fare)}</span></div>
        <p style="margin-top:8px;font-size:13px;">${r.pickup.address} → ${r.destination.address}</p>
        <p class="muted" style="margin-top:4px;">${r.passengerName||'—'} ${r.riderName?'→ '+r.riderName:''} · ${timeAgo(r.createdAt)}</p>`;
      list.appendChild(el);
    });
  }catch(e){ list.innerHTML = `<div class="empty-state"><p>Couldn't load trips.</p></div>`; }
}

// ---- Pricing ----
function aRenderPricing(){
  const c = $('a-screen-pricing'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-pricing'));
  $('a-price-base').value = fareRules.baseFare;
  $('a-price-perkm').value = fareRules.perKm;
  $('a-price-permin').value = fareRules.perMin;
  $('a-price-min').value = fareRules.minFare;
  $('a-price-commission').value = fareRules.commissionPct;
  $('a-save-pricing').addEventListener('click', async ()=>{
    const updated = {
      baseFare: parseFloat($('a-price-base').value)||0,
      perKm: parseFloat($('a-price-perkm').value)||0,
      perMin: parseFloat($('a-price-permin').value)||0,
      minFare: parseFloat($('a-price-min').value)||0,
      commissionPct: parseFloat($('a-price-commission').value)||0
    };
    await db.collection('settings').doc('fareRules').set(updated);
    fareRules = updated;
    toast('Pricing rules saved.', 'ok');
  });
}

// ---- Service area ----
function aRenderArea(){
  const c = $('a-screen-area'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-area'));
  $('a-area-name').value = serviceArea.name;
  $('a-area-lat').value = serviceArea.lat;
  $('a-area-lng').value = serviceArea.lng;
  $('a-area-radius').value = serviceArea.radiusKm;
  $('a-save-area').addEventListener('click', async ()=>{
    const updated = {
      name: $('a-area-name').value.trim() || 'Ikeja LGA',
      lat: parseFloat($('a-area-lat').value),
      lng: parseFloat($('a-area-lng').value),
      radiusKm: parseFloat($('a-area-radius').value)
    };
    if(isNaN(updated.lat) || isNaN(updated.lng) || isNaN(updated.radiusKm)){ toast('Enter valid numbers.', 'err'); return; }
    await db.collection('settings').doc('serviceArea').set(updated);
    serviceArea = updated;
    toast('Service area updated.', 'ok');
  });
}

// ---- Withdrawals ----
function aRenderWithdrawals(){
  const c = $('a-screen-withdrawals'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-withdrawals'));
  aLoadAdminWithdrawals();
}
async function aLoadAdminWithdrawals(){
  const list = $('a-withdrawals-list');
  list.innerHTML = '<div class="skel" style="height:70px;"></div>';
  try{
    const snap = await db.collection('withdrawals').get();
    let items = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    items.sort((a,b)=> (b.requestedAt?.toMillis?.()||0) - (a.requestedAt?.toMillis?.()||0));
    if(items.length===0){ list.innerHTML = `<div class="empty-state"><p>No withdrawal requests</p></div>`; return; }
    list.innerHTML = '';
    items.forEach(w=>{
      const pillCls = w.status==='approved'?'pill-green':w.status==='rejected'?'pill-red':'pill-amber';
      const el = document.createElement('div'); el.className='card';
      el.innerHTML = `<div class="row"><strong>${w.riderName}</strong><span class="pill ${pillCls}">${w.status.toUpperCase()}</span></div>
        <p class="meter" style="margin-top:6px;font-size:18px;">${fmtNaira(w.amount)}</p>
        <p class="muted" style="margin-top:4px;">${w.bank} · ${w.account}</p>
        <div class="btn-block-row" style="margin-top:10px;" data-actions></div>`;
      const actions = el.querySelector('[data-actions]');
      if(w.status === 'pending'){
        const approveBtn = document.createElement('button'); approveBtn.className='btn btn-primary btn-sm'; approveBtn.textContent='Mark paid';
        approveBtn.addEventListener('click', async ()=>{ await db.collection('withdrawals').doc(w.id).update({status:'approved'}); toast('Marked as paid.', 'ok'); aLoadAdminWithdrawals(); });
        const rejectBtn = document.createElement('button'); rejectBtn.className='btn btn-outline btn-sm'; rejectBtn.style.color='var(--red-600)'; rejectBtn.style.borderColor='var(--red-600)'; rejectBtn.textContent='Reject & refund';
        rejectBtn.addEventListener('click', async ()=>{
          await db.collection('withdrawals').doc(w.id).update({status:'rejected'});
          await db.collection('riders').doc(w.riderId).update({ walletBalance: FieldValue.increment(w.amount) });
          toast('Rejected and refunded to wallet.'); aLoadAdminWithdrawals();
        });
        actions.append(approveBtn, rejectBtn);
      }
      list.appendChild(el);
    });
  }catch(e){ list.innerHTML = `<div class="empty-state"><p>Couldn't load withdrawals.</p></div>`; }
}

// ---- Complaints ----
function aRenderComplaints(){
  const c = $('a-screen-complaints'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-complaints'));
  aLoadComplaints();
}
async function aLoadComplaints(){
  const list = $('a-complaints-list');
  list.innerHTML = '<div class="skel" style="height:70px;"></div>';
  try{
    const snap = await db.collection('complaints').get();
    let items = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    items.sort((a,b)=> (b.createdAt?.toMillis?.()||0) - (a.createdAt?.toMillis?.()||0));
    if(items.length===0){ list.innerHTML = `<div class="empty-state"><p>No complaints</p></div>`; return; }
    list.innerHTML = '';
    items.forEach(cm=>{
      const isSOS = cm.type === 'sos';
      const pillCls = cm.status==='resolved' ? 'pill-green' : isSOS ? 'pill-red' : 'pill-amber';
      const el = document.createElement('div'); el.className='card';
      el.innerHTML = `<div class="row"><span class="pill ${pillCls}">${isSOS?'🆘 SOS':'COMPLAINT'}</span><span class="pill pill-grey">${(cm.status||'open').toUpperCase()}</span></div>
        <p style="margin-top:8px;font-size:13px;">${cm.text || (isSOS ? 'Emergency alert triggered during a trip.' : '')}</p>
        <p class="muted" style="margin-top:6px;">${cm.userName||'User'} (${cm.role||''}) · ${timeAgo(cm.createdAt)}</p>
        ${cm.location ? `<p class="muted" style="margin-top:4px;">📍 ${cm.location.lat.toFixed(4)}, ${cm.location.lng.toFixed(4)}</p>` : ''}
        <div data-actions></div>`;
      if(cm.status !== 'resolved'){
        const resolveBtn = document.createElement('button'); resolveBtn.className='btn btn-outline btn-sm'; resolveBtn.style.marginTop='10px'; resolveBtn.textContent='Mark resolved';
        resolveBtn.addEventListener('click', async ()=>{ await db.collection('complaints').doc(cm.id).update({status:'resolved'}); toast('Marked resolved.', 'ok'); aLoadComplaints(); });
        el.querySelector('[data-actions]').appendChild(resolveBtn);
      }
      list.appendChild(el);
    });
  }catch(e){ list.innerHTML = `<div class="empty-state"><p>Couldn't load complaints.</p></div>`; }
}

// ---- Broadcast ----
function aRenderBroadcast(){
  const c = $('a-screen-broadcast'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-broadcast'));
  $('a-send-broadcast').addEventListener('click', async ()=>{
    const audience = $('a-broadcast-audience').value;
    const title = $('a-broadcast-title').value.trim();
    const message = $('a-broadcast-message').value.trim();
    if(!title || !message){ toast('Add a title and message.', 'err'); return; }
    await db.collection('notifications').add({ audience, title, message, createdAt: FieldValue.serverTimestamp() });
    toast('Notification sent.', 'ok');
    $('a-broadcast-title').value=''; $('a-broadcast-message').value='';
  });
}
</script>
