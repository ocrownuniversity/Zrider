async function pSheetActive(sheet, ride){
  sheet.appendChild(clone('tpl-p-active-ride'));
  const statusMap = { accepted:['pill-amber','RIDER ON THE WAY'], arriving:['pill-amber','RIDER ARRIVING'], ongoing:['pill-green','TRIP IN PROGRESS'] };
  const [cls,label] = statusMap[ride.status] || ['pill-grey','UPDATING'];
  const pill = $('p-ride-status-pill');
  pill.className = 'pill ' + cls;
  pill.innerHTML = `<span class="pill-dot"></span>${label}`;
  renderStepper($('p-ride-stepper'), [
    {key:'accepted',label:'Accepted'}, {key:'arriving',label:'Arriving'},
    {key:'ongoing',label:'In trip'}, {key:'completed',label:'Done'}
  ], ride.status);
  $('p-ride-fare').textContent = fmtNaira(ride.fare);
  if(ride.status === 'ongoing' && ride.startedAt){
    const startMs = ride.startedAt.toMillis ? ride.startedAt.toMillis() : Date.now();
    function tickFare(){
      const elapsedMin = (Date.now() - startMs) / 60000;
      const live = Math.round((ride.fare + elapsedMin * (fareRules.perMin||10)) / 10) * 10;
      const el = $('p-ride-fare');
      if(el) el.textContent = fmtNaira(live);
    }
    tickFare();
    pFareTickerInterval = setInterval(tickFare, 15000);
  }
  $('p-route-pickup').textContent = ride.pickup.address;
  $('p-route-dest').textContent = ride.destination.address;

  if(ride.riderId){
    const rsnap = await db.collection('users').doc(ride.riderId).get();
    const rbike = await db.collection('riders').doc(ride.riderId).get();
    if(rsnap.exists){
      const rd = rsnap.data();
      $('p-rider-name').innerHTML = `${rd.name} <span class="badge-verify">✓ Verified</span>`;
      $('p-rider-avatar').textContent = initials(rd.name);
      if(rd.photoURL) $('p-rider-avatar').innerHTML = `<img src="${rd.photoURL}">`;
      $('p-rider-bike').textContent = rbike.exists ? `${rbike.data().bikeModel} · ${rbike.data().plate}` : 'Bike rider';
      $('p-call-rider').addEventListener('click', ()=> window.location.href = `tel:${rd.phone||''}`);
      $('p-chat-rider').addEventListener('click', ()=> openChat(ride.id, rd.name));
    }
  }
  $('p-cancel-ride').addEventListener('click', ()=>{
    promptCancelReason(CANCEL_REASONS_PASSENGER, async (reason)=>{
      await db.collection('rides').doc(ride.id).update({ status:'cancelled', cancelledBy:'passenger', cancelReason:reason });
      toast('Trip cancelled.');
    });
  });
  $('p-report-issue').addEventListener('click', ()=> openComplaintModal(ride.id));
}

function pSheetRate(sheet, ride){
  sheet.appendChild(clone('tpl-p-rate'));
  $('p-receipt-pickup').textContent = ride.pickup.address;
  $('p-receipt-dest').textContent = ride.destination.address;
  $('p-receipt-distance').textContent = fmtKm(ride.distanceKm);
  $('p-receipt-payment').textContent = ride.paymentMethod === 'card' ? 'Card / Bank' : 'Cash';
  $('p-receipt-fare').textContent = fmtNaira(ride.fare);
  $('p-rate-rider-name').textContent = ride.riderName || 'your rider';
  let rating = 5;
  const stars = $('p-stars').querySelectorAll('svg');
  function paint(){ stars.forEach(s => s.classList.toggle('on', parseInt(s.dataset.v) <= rating)); }
  paint();
  stars.forEach(s => s.addEventListener('click', ()=>{ rating = parseInt(s.dataset.v); paint(); }));
  $('p-submit-rating').addEventListener('click', async ()=>{
    const comment = $('p-rate-comment').value.trim();
    await db.collection('rides').doc(ride.id).update({ passengerRated:true, riderRatingByPassenger:rating, riderComment:comment, passengerActive:false });
    if(ride.riderId){
      const uref = db.collection('users').doc(ride.riderId);
      const usnap = await uref.get();
      const ud = usnap.data();
      const newCount = (ud.ratingCount||0)+1;
      const newRating = (((ud.rating||5)*(ud.ratingCount||0)) + rating)/newCount;
      await uref.update({ rating:newRating, ratingCount:newCount });
    }
    toast('Thanks for your feedback!', 'ok');
  });
}

function openPaystackDeposit(){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'zr-overlay';
  overlay.innerHTML = `<div class="modal"><div class="modal-head"><h3>Fund wallet via Paystack</h3></div>
    <div class="field"><label>Amount to add (₦)</label><input type="number" id="ps-deposit-amount" placeholder="e.g. 2000" min="100"></div>

  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', closeModal));

    const amount = parseFloat(overlay.querySelector('#ps-deposit-amount').value);

    closeModal();
    const ok = await collectPaystackPayment(amount, async (ref)=>{

        uid: currentUser.uid, userName: currentUserDoc.name, amount,

      toast(`₦${amount.toLocaleString()} added to your wallet!`, 'ok');
      pSwitchTab('wallet');
    });
    if(!ok) toast('Payment cancelled.','');
  });

// ---- Shared: Notifications list loader (used by passenger + rider) ----
function loadNotificationsInto(containerId, uid, role){
  const list = $(containerId);
  list.innerHTML = '<div class="skel" style="height:50px;margin-bottom:10px;"></div>';
  Promise.all([
    db.collection('notifications').where('uid','==',uid).get(),
    db.collection('notifications').where('audience','==','all').get(),
    db.collection('notifications').where('audience','==',role).get()
  ]).then(([a,b,c])=>{
    const map = {};
    [...a.docs, ...b.docs, ...c.docs].forEach(d=> map[d.id] = Object.assign({id:d.id}, d.data()));
    let items = Object.values(map);
    items.sort((x,y)=> (y.createdAt?.toMillis?.()||0) - (x.createdAt?.toMillis?.()||0));
    if(items.length===0){ list.innerHTML = `<div class="empty-state"><div>🔔</div><p>No notifications yet</p></div>`; return; }
    list.innerHTML = '';
    items.forEach(n=>{
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<strong style="font-size:14px;">${n.title}</strong><p class="muted" style="margin-top:4px;">${n.message}</p><p class="muted" style="margin-top:6px;font-size:11px;">${timeAgo(n.createdAt)}</p>`;
      list.appendChild(el);
    });
  }).catch(()=>{ list.innerHTML = `<div class="empty-state"><p>Couldn't load notifications.</p></div>`; });
}

      });

async function verifyRiderByCode(rawCode, resultBox){
  const code = (rawCode||'').trim().toUpperCase();
  if(!code){ toast('Enter a Rider ID first.', 'err'); return; }
  resultBox.innerHTML = '<div class="skel" style="height:90px;"></div>';
  const notFound = ()=>{
    resultBox.innerHTML = `<div class="card" style="background:var(--red-100);border:1px solid var(--red-600);">
      <p style="color:var(--red-600);font-weight:600;">Rider not found.</p>
      <p class="muted" style="margin-top:4px;font-size:13px;">Please contact customer support.</p>
      <a class="btn btn-outline btn-sm support-phone-btn" href="tel:${generalSettings.supportPhone}" style="margin-top:10px;text-decoration:none;display:inline-flex;">📞 Support: <span class="support-phone-number">${generalSettings.supportPhone}</span></a>
    </div>`;
  };
  try{
    // Only riders with status 'approved' are ever shown — pending, rejected,
    // and suspended riders (which also use the 'rejected' status internally)
    // all fail this check and fall through to "Rider not found".
    const snap = await db.collection('riders').where('riderCode','==',code).limit(1).get();
    if(snap.empty || snap.docs[0].data().status !== 'approved'){ notFound(); return; }
    const rd = snap.docs[0].data();
    const uid = snap.docs[0].id;
    const uSnap = await db.collection('users').doc(uid).get();
    const u = uSnap.exists ? uSnap.data() : {};
    const photo = u.photoURL
      ? `<img src="${u.photoURL}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;">`
      : `<div class="avatar" style="width:64px;height:64px;font-size:24px;">${initials(u.name||'?')}</div>`;
    resultBox.innerHTML = `<div class="card">
      <div class="row" style="align-items:center;gap:12px;">
        ${photo}
        <div>
          <strong style="font-size:16px;">${escapeHtml(u.name||'—')}</strong>
          <div class="pill pill-green" style="margin-top:4px;font-size:10px;">✅ Verified · Active</div>
        </div>
      </div>
      <div class="divider" style="margin:12px 0;"></div>
      <div class="row"><span class="muted">Rider ID</span><span class="meter">${escapeHtml(rd.riderCode)}</span></div>
      <div class="divider"></div>
      <div class="row"><span class="muted">Phone</span><a href="tel:${u.phone||''}" style="color:var(--amber-500);">${escapeHtml(u.phone||'—')}</a></div>
      <div class="divider"></div>
      <div class="row"><span class="muted">Rating</span><span>★ ${(u.rating||5).toFixed(1)}</span></div>
      <div class="divider"></div>
      <div class="row"><span class="muted">Vehicle</span><span>${escapeHtml(rd.bikeModel||'—')} · ${escapeHtml(rd.plate||'—')}</span></div>
    </div>`;
  }catch(e){ notFound(); }
}

const CANCEL_REASONS_PASSENGER = ['Rider is taking too long','Wrong pickup location','Found another ride','Changed my mind','Other'];
const CANCEL_REASONS_RIDER = ['Passenger unreachable','Passenger not at pickup','Vehicle issue','Unsafe situation','Other'];

// ============================== RIDER APP ==============================
let rCurrentTab = 'home';
let rDeclinedIds = new Set();

// Reused across every alert instead of creating a brand-new AudioContext
// each time a request comes in. Mobile browsers cap how many AudioContexts
// can exist at once, and the old code created one per ring and never closed
// it — after a handful of bookings that limit was silently exhausted, so
// the ringtone worked for the first request or two and then quietly did
// nothing for every booking after that (the try/catch swallowed the
// failure). Keeping one shared context and resuming it if it was ever
// auto-suspended fixes ringing for every incoming booking, not just the
// first ones.
let _rAlertCtx = null;
function alertNewRequest(){
  try{
    if(navigator.vibrate) navigator.vibrate([200,80,200]);
    if(!_rAlertCtx) _rAlertCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _rAlertCtx;
    if(ctx.state === 'suspended') ctx.resume();
    [880, 1175].forEach((freq, i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.18, ctx.currentTime + i*0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.18 + 0.16);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime + i*0.18);
      osc.stop(ctx.currentTime + i*0.18 + 0.17);
    });
  }catch(e){ /* audio not available — silent fail is fine */ }
}

function renderRiderApp(){
  mount('tpl-app-rider');
  $('r-avatar').textContent = initials(currentUserDoc.name);
  rCurrentTab = 'home';

  $('r-bottomnav').addEventListener('click', (e)=>{
    const btn = e.target.closest('button[data-tab]');
    if(!btn) return;
    rSwitchTab(btn.dataset.tab);
  });
  $('r-open-notifs').addEventListener('click', ()=> rSwitchTab('requests'));

  rRenderHomeTab();
  rListenActiveRide();
  applyTranslations();
}

function rSwitchTab(tab){
  rCurrentTab = tab;
  ['home','requests','earnings','history','profile'].forEach(t=>{
    $('r-screen-'+t).classList.toggle('hidden', t!==tab);
  });
  $('r-bottomnav').querySelectorAll('button').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='requests'){
    const c = $('r-screen-requests');
    if(!c.dataset.built){ c.appendChild(clone('tpl-r-requests')); c.dataset.built = '1'; }
    rProcessIncomingSnapshot();
  }
  if(tab==='earnings') rRenderEarningsTab();
  if(tab==='history') rRenderHistoryTab();
  if(tab==='profile') rRenderProfileTab();
  applyTranslations();
}

function rRenderHomeTab(){
  const c = $('r-screen-home');
  c.innerHTML = '';
  c.appendChild(clone('tpl-r-home'));
  $('r-greeting-line').textContent = getGreeting();
  $('r-greeting-name').textContent = (currentUserDoc.name || '').split(' ')[0] || 'there';
  renderSupportPhoneEverywhere();
  renderMapInto('map-rider','map-rider-fallback', null);
  getCurrentPosition().then(pos => renderMapInto('map-rider','map-rider-fallback', pos)).catch(()=>{});
  rRenderSheetIdle();
  // Subscribed exactly once per rider-app mount — previously this was
  // called from rRenderSheetIdle() itself, which ran every single time
  // the sheet returned to idle (after declining a ride, after finishing a
  // trip, etc.), silently stacking up a new duplicate Firestore listener
  // each time with no limit. Over a session that meant more and more
  // redundant listeners all racing to redraw the same UI, which could
  // eventually make new requests appear to stop showing up reliably.
  rListenIncomingRequests();
}

function rRenderSheetIdle(){
  const sheet = $('r-sheet');
  if(!sheet) return;
  sheet.innerHTML = '';
  sheet.appendChild(clone('tpl-r-idle'));
  const toggle = $('r-online-toggle');
  toggle.checked = !!riderDoc.online;
  const DAILY_GOAL = 5000;
  const todayEarnings = riderDoc.todayEarnings || 0;
  $('r-today-earnings').textContent = fmtNaira(todayEarnings);
  $('r-today-trips').textContent = (riderDoc.todayTrips || 0).toString();
  $('r-goal-label').textContent = `${fmtNaira(todayEarnings)} / ${fmtNaira(DAILY_GOAL)}`;
  setTimeout(()=>{
    const bar = $('r-goal-bar');
    if(bar) bar.style.width = Math.min(100, (todayEarnings/DAILY_GOAL)*100).toFixed(1) + '%';
  }, 100);
  paintToggle();
  document.querySelector('#r-sheet label').addEventListener('click', async (e)=>{
    e.preventDefault();
    const goingOnline = !toggle.checked;
    toggle.checked = goingOnline;
    paintToggle();
    await setRiderOnline(goingOnline);
  });
  function paintToggle(){
    $('r-toggle-track').style.background = toggle.checked ? 'var(--amber-500)' : 'var(--surface-2)';
    $('r-toggle-knob').style.left = toggle.checked ? '25px' : '3px';
    $('r-toggle-knob').style.background = toggle.checked ? '#000' : '#fff';
    $('r-status-label').textContent = toggle.checked ? "You're online" : "You're offline";
  }
}

async function setRiderOnline(online){
  riderDoc.online = online;
  await db.collection('riders').doc(currentUser.uid).update({ online });
  if(online){
    if(navigator.geolocation){
      watchId = navigator.geolocation.watchPosition(pos=>{
        db.collection('riders').doc(currentUser.uid).update({ location: { lat:pos.coords.latitude, lng:pos.coords.longitude } }).catch(()=>{});
      }, ()=>{}, { enableHighAccuracy:true });
    }
    toast('You are online — looking for ride requests.', 'ok');
    rProcessIncomingSnapshot();
  } else {
    if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
    toast('You are now offline.');
    $('r-pending-list-wrap')?.classList.add('hidden');
  }
}

// Ride IDs we've already sounded the alert for this session, so a rider
// who's mid-decline-flow (or just has the list open) still gets a fresh
// ding for a genuinely new second/third request, not just when the single
// top-priority card happens to change.
let rAlertedRideIds = new Set();

// Latest raw docs from the open-requests query, kept even while we're
// offline/mid-trip and skipping the render below. Firestore's onSnapshot
// only fires again when the query results actually change server-side —
// it does NOT re-fire just because riderDoc.online flipped locally. Without
// caching this, a request placed while a rider was offline (or mid-trip)
// would sit there unseen even after the rider went online, because no new
// write happened to re-trigger the listener. rProcessIncomingSnapshot()
// lets us re-run the same logic on demand, e.g. right after going online.
let _rLastRideDocs = [];

function rProcessIncomingSnapshot(){
  if(!riderDoc.online || activeRideId){
    const wrap = $('r-pending-list-wrap'); if(wrap) wrap.classList.add('hidden');
    return; // ignore while offline or mid-trip
  }
  const candidates = _rLastRideDocs
    .filter(r=> !rDeclinedIds.has(r.id) && isLikelyInServiceArea(r.pickup));
  candidates.sort((a,b)=> (a.createdAt?.toMillis?.()||0) - (b.createdAt?.toMillis?.()||0));

  // Alert for every request we haven't already alerted for — covers
  // multiple simultaneous pending rides, not just the newest one.
  let hasNewArrival = false;
  candidates.forEach(c=>{ if(!rAlertedRideIds.has(c.id)){ rAlertedRideIds.add(c.id); hasNewArrival = true; } });
  if(hasNewArrival) alertNewRequest();

  rRenderPendingList(candidates);

  if(candidates.length === 0){ if(rCurrentTab==='home' && !activeRideId) rRenderSheetIdle(); return; }
  if(rCurrentTab==='home' && !activeRideId) rRenderSheetIncoming(candidates[0]);
}

function rListenIncomingRequests(){
  const unsub = db.collection('rides').where('status','==','searching').where('riderId','==',null)
    .onSnapshot(snap=>{
      _rLastRideDocs = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
      rProcessIncomingSnapshot();
    }, err => {
      // Previously this only logged to console, so a Firestore permission
      // error (e.g. security rules blocking reads of unassigned rides where
      // riderId is null) failed completely silently — the rider would just
      // never see any requests with no visible sign anything was wrong.
      console.warn('incoming requests listener error', err);
      if(err && err.code === 'permission-denied'){
        toast('Cannot load ride requests — check Firestore security rules for the rides collection.', 'err');
      }
    });
  activeListeners.push(unsub);
}

// Persistent list of every open ride request, visible any time the rider
// is online — separate from the single "top priority" card in the sheet,
// so a rider can see and act on more than one waiting request at a time
// instead of only ever seeing them one-by-one in sequence.
function rRenderPendingList(candidates){
  const wrap = $('r-pending-list-wrap');
  const count = candidates.length;

  // Badge on the "Requests" bottom-nav tab — visible from any tab, so the
  // rider can see there's a pending request even while on Earnings/Trips.
  const badge = $('r-requests-badge');
  if(badge){
    if(riderDoc.online && count > 0){ badge.textContent = count > 9 ? '9+' : String(count); badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
  }

  const cardHtml = r => `
    <div class="card" style="margin-bottom:10px;">
      <div class="row">
        <strong style="font-size:14.5px;">${escapeHtml(r.passengerName || 'Passenger')}</strong>
        <span class="meter" style="font-size:15px;">${fmtNaira(r.fare)}</span>
      </div>
      <div class="row" style="margin-top:6px;"><span class="muted" style="font-size:12.5px;">Pickup</span><span style="font-size:12.5px;text-align:right;max-width:65%;">${escapeHtml(r.pickup.address)}</span></div>
      <div class="row" style="margin-top:4px;"><span class="muted" style="font-size:12.5px;">Destination</span><span style="font-size:12.5px;text-align:right;max-width:65%;">${escapeHtml(r.destination.address)}</span></div>
      <div class="row" style="margin-top:4px;"><span class="muted" style="font-size:12.5px;">Distance</span><span class="meter" style="font-size:13px;">${fmtKm(r.distanceKm)}</span></div>
      <div class="btn-block-row" style="margin-top:10px;">
        <button class="btn btn-outline r-pending-decline" style="color:var(--red-600);border-color:var(--red-600);padding:9px;font-size:13px;" data-ride-id="${r.id}">Decline</button>
        <button class="btn btn-primary r-pending-accept" style="padding:9px;font-size:13px;" data-ride-id="${r.id}">Accept</button>
      </div>
    </div>
  `;
  const wireButtons = listEl=>{
    listEl.querySelectorAll('.r-pending-decline').forEach(btn=>{
      btn.addEventListener('click', ()=>{ rDeclinedIds.add(btn.dataset.rideId); rRenderSheetIdle(); rProcessIncomingSnapshot(); });
    });
    listEl.querySelectorAll('.r-pending-accept').forEach(btn=>{
      btn.addEventListener('click', ()=> rAcceptRide(btn.dataset.rideId, btn));
    });
  };

  // Home tab's pending panel (only shown while online and non-empty).
  if(wrap){
    if(!riderDoc.online || count === 0){ wrap.classList.add('hidden'); }
    else {
      wrap.classList.remove('hidden');
      const countEl = $('r-pending-count'); if(countEl) countEl.textContent = count;
      const list = $('r-pending-list');
      if(list){ list.innerHTML = candidates.map(cardHtml).join(''); wireButtons(list); }
    }
  }

  // Dedicated Requests tab — always reflects the current state (including
  // offline/empty messaging) whether or not the rider is currently on it.
  const reqList = $('r-requests-list');
  const reqEmpty = $('r-requests-empty');
  const reqOffline = $('r-requests-offline-msg');
  if(reqList){
    if(!riderDoc.online){
      reqOffline?.classList.remove('hidden');
      reqEmpty?.classList.add('hidden');
      reqList.innerHTML = '';
    } else if(count === 0){
      reqOffline?.classList.add('hidden');
      reqEmpty?.classList.remove('hidden');
      reqList.innerHTML = '';
    } else {
      reqOffline?.classList.add('hidden');
      reqEmpty?.classList.add('hidden');
      reqList.innerHTML = candidates.map(cardHtml).join('');
      wireButtons(reqList);
    }
  }
}

// Shared accept logic used by both the single "top priority" incoming
// card and the full pending-requests list, so accepting works the same
// way (and with the same race-condition safety) from either place.
async function rAcceptRide(rideId, btnEl){
  if(btnEl){ btnEl.disabled = true; btnEl.innerHTML = '<span class="spinner"></span>'; }
  try{
    await db.runTransaction(async (tx)=>{
      const ref = db.collection('rides').doc(rideId);
      const fresh = await tx.get(ref);
      if(!fresh.exists || fresh.data().riderId){ throw new Error('TAKEN'); }
      tx.update(ref, {
        riderId: currentUser.uid, riderName: currentUserDoc.name, riderPhone: currentUserDoc.phone || '',
        status: 'accepted', riderActive: true
      });
    });
    toast('Ride accepted! Head to pickup.', 'ok');
  }catch(e){
    toast('Sorry, that ride was already taken.', 'err');
    rDeclinedIds.add(rideId); rRenderSheetIdle();
  }
}

function rRenderSheetIncoming(ride){
  const sheet = $('r-sheet');
  sheet.innerHTML = '';
  sheet.appendChild(clone('tpl-r-incoming'));
  $('r-req-fare').textContent = fmtNaira(ride.fare);
  $('r-req-avatar').textContent = initials(ride.passengerName);
  $('r-req-passenger').textContent = ride.passengerName;
  $('r-req-pickup').textContent = ride.pickup.address;
  $('r-req-dest').textContent = ride.destination.address;
  $('r-req-distance').textContent = fmtKm(ride.distanceKm);

  db.collection('users').doc(ride.passengerId).get().then(s=>{
    if(s.exists) $('r-req-rating').textContent = '★ ' + (s.data().rating||5).toFixed(1);
  });

  $('r-decline-ride').addEventListener('click', ()=>{ rDeclinedIds.add(ride.id); rRenderSheetIdle(); });
  $('r-accept-ride').addEventListener('click', ()=> rAcceptRide(ride.id, $('r-accept-ride')));
}

function rListenActiveRide(){
  const unsub = db.collection('rides')
    .where('riderId','==', currentUser.uid)
    .where('riderActive','==', true)
    .onSnapshot(snap=>{
      if(snap.empty){ activeRideId = null; if(rCurrentTab==='home') rRenderSheetIdle(); rProcessIncomingSnapshot(); return; }
      const doc = snap.docs[0];
      activeRideId = doc.id;
      const ride = Object.assign({id:doc.id}, doc.data());
      if(rCurrentTab==='home'){
        if(ride.status === 'cancelled') rSheetCancelled(ride);
        else rRenderSheetActive(ride);
      }
    }, err => console.warn('rider active ride listener error', err));
  activeListeners.push(unsub);
}

function rSheetCancelled(ride){
  const sheet = $('r-sheet');

    <div class="sheet-handle"></div>

      <div style="font-size:30px;">✕</div>
      <h3 style="margin-top:8px;">Trip cancelled</h3>

      <button class="btn btn-primary" id="r-back-online" style="margin-top:16px;">Back online</button>
    </div>`;
  $('r-back-online').addEventListener('click', async ()=>{
    await db.collection('rides').doc(ride.id).update({ riderActive:false });
  });
}

function rRenderSheetActive(ride){
  const sheet = $('r-sheet');
  sheet.innerHTML = '';
  sheet.appendChild(clone('tpl-r-active'));
  const statusMap = {
    accepted: ['pill-amber','HEADING TO PICKUP',"I've arrived"],
    arriving: ['pill-amber','ARRIVED AT PICKUP','Start trip'],
    ongoing: ['pill-green','TRIP IN PROGRESS','Complete trip']
  };
  const [cls,label,btnLabel] = statusMap[ride.status] || ['pill-grey','UPDATING','Continue'];
  const pill = $('r-trip-status-pill');
  pill.className = 'pill ' + cls;
  pill.innerHTML = `<span class="pill-dot"></span>${label}`;
  renderStepper($('r-trip-stepper'), [
    {key:'accepted',label:'Accepted'}, {key:'arriving',label:'Arrived'},
    {key:'ongoing',label:'In trip'}, {key:'completed',label:'Done'}
  ], ride.status);

      toast('Trip cancelled.');
    });
  });
  $('r-report-issue').addEventListener('click', ()=> openComplaintModal(ride.id));
}

async function riderCompleteTrip(ride){
  const commission = Math.round(ride.fare * (fareRules.commissionPct/100));
  const earning = ride.fare - commission; // rider's net take-home either way
  const isCash = ride.paymentMethod === 'cash';

  // If the app has stayed open across midnight, roll "today" over before
  // adding this trip's earnings, so they don't get folded into yesterday's total.
  if(riderDoc.todayDate !== todayKey()){
    riderDoc.todayEarnings = 0; riderDoc.todayTrips = 0; riderDoc.todayDate = todayKey();
    await db.collection('riders').doc(currentUser.uid).update({ todayEarnings:0, todayTrips:0, todayDate: todayKey() });
  }

  await db.collection('rides').doc(ride.id).update({
    status:'completed', completedAt: FieldValue.serverTimestamp(), riderActive:false,
    riderEarning: earning, riderCashCommission: isCash ? commission : 0
  });

  if(isCash){
    // Cash trips: the rider already collected the full fare in physical
    // cash from the passenger, so the wallet must NOT also be credited
    // with the earning — that would double-pay them. Instead, only the
    // platform's commission share (which the company never actually
    // received, since the money went straight to the rider) is deducted
    // from the rider's wallet balance.
    await db.collection('riders').doc(currentUser.uid).update({
      walletBalance: FieldValue.increment(-commission),
      totalEarned: FieldValue.increment(earning),
      totalTrips: FieldValue.increment(1),
      todayEarnings: FieldValue.increment(earning),
      todayTrips: FieldValue.increment(1)
    });
    await chargeCashCommission(currentUser.uid, commission, `Commission on cash trip — ${fmtNaira(ride.fare)} collected in cash`, { rideId: ride.id, method:'cash_commission' });
    riderDoc.walletBalance = (riderDoc.walletBalance||0) - commission;
    riderDoc.todayEarnings = (riderDoc.todayEarnings||0) + earning;
    riderDoc.todayTrips = (riderDoc.todayTrips||0) + 1;
    toast(`Trip completed! You collected ${fmtNaira(ride.fare)} cash. ₦${commission.toLocaleString()} commission deducted from your wallet.`, 'ok');
  } else {
    // Wallet / card trips: the platform already holds the money, so the
    // rider's net earning is credited to their wallet as usual.
    await db.collection('riders').doc(currentUser.uid).update({
      walletBalance: FieldValue.increment(earning),
      totalEarned: FieldValue.increment(earning),
      totalTrips: FieldValue.increment(1),
      todayEarnings: FieldValue.increment(earning),
      todayTrips: FieldValue.increment(1)
    });
    await creditWallet(currentUser.uid, earning, `Trip earnings — ${fmtNaira(ride.fare)} fare`, { rideId: ride.id, method:'trip_earning' });
    riderDoc.walletBalance = (riderDoc.walletBalance||0) + earning;
    riderDoc.todayEarnings = (riderDoc.todayEarnings||0) + earning;
    riderDoc.todayTrips = (riderDoc.todayTrips||0) + 1;
    toast(`Trip completed! You earned ${fmtNaira(earning)}`, 'ok');
  }

  // Check if passenger gets referral reward for first trip
  checkAndAwardReferral(ride.passengerId);
  promptRating('Rate this passenger', async (rating)=>{
    await db.collection('rides').doc(ride.id).update({ passengerRatingByRider: rating });
    const uref = db.collection('users').doc(ride.passengerId);
    const usnap = await uref.get();
    const ud = usnap.data();
    const newCount = (ud.ratingCount||0)+1;
    const newRating = (((ud.rating||5)*(ud.ratingCount||0)) + rating)/newCount;
    await uref.update({ rating:newRating, ratingCount:newCount });
  });
}

// ---- Shared: simple inline bar chart over the last N days (no chart library needed) ----
function renderDayChart(boxId, rides, numDays, valueFn, fmtFn){
  const box = $(boxId);
  if(!box) return [];
  const days = [];
  for(let i=numDays-1; i>=0; i--){
    const d = new Date();
    d.setDate(d.getDate() - i);
    d.setHours(0,0,0,0);
    days.push({ date:d, label: d.toLocaleDateString('en-NG', numDays > 7 ? {day:'numeric',month:'short'} : {weekday:'short'}), value:0 });
  }
  rides.forEach(r=>{
    const t = r.completedAt?.toDate?.() || r.createdAt?.toDate?.();
    if(!t) return;
    const dayKey = new Date(t.getFullYear(), t.getMonth(), t.getDate()).getTime();
    const match = days.find(d => d.date.getTime() === dayKey);
    if(match) match.value += valueFn(r);
  });
  const max = Math.max(1, ...days.map(d=>d.value));
  const fmt = fmtFn || (v => v.toString());
  const showLabel = numDays <= 14; // beyond that, per-bar value labels get too cramped
  box.innerHTML = `<div style="display:flex;align-items:flex-end;gap:${numDays > 14 ? 3 : 8}px;height:120px;overflow-x:auto;">
    ${days.map(d => `
      <div style="flex:1;min-width:${numDays > 14 ? '10px' : '0'};display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;">
        ${showLabel ? `<span class="meter" style="font-size:10px;margin-bottom:4px;">${fmt(d.value)}</span>` : ''}
        <div style="width:100%;border-radius:6px 6px 2px 2px;background:var(--green-700);height:${Math.max(4, (d.value/max)*84)}px;" title="${d.label}: ${fmt(d.value)}"></div>
        <span class="muted" style="font-size:9px;margin-top:6px;white-space:nowrap;">${d.label}</span>
      </div>`).join('')}
  </div>`;
  return days;
}
function renderSevenDayChart(boxId, rides, valueFn, fmtFn){
  return renderDayChart(boxId, rides, 7, valueFn, fmtFn);
}

// ---- Shared: Unique Rider ID generation ----
// Uses a counter document + transaction so IDs are guaranteed unique even
// if two riders were somehow approved at the exact same moment — a random
// ID with a "check then set" approach can't make that same guarantee.
async function generateUniqueRiderCode(){
  const counterRef = db.collection('settings').doc('riderCodeCounter');
  const next = await db.runTransaction(async (tx)=>{
    const snap = await tx.get(counterRef);
    const current = snap.exists ? (snap.data().value || 10000) : 10000;
    const nextVal = current + 1;
    tx.set(counterRef, { value: nextVal }, { merge:true });
    return nextVal;
  });
  return 'ZR' + next;
}

      // Backfill: any already-approved rider from before this feature existed
      // won't have a riderCode yet — assign one silently the next time an
      // admin views the Riders list, so nobody is left without an ID.
      if(r.status === 'approved' && !r.riderCode){
        generateUniqueRiderCode().then(code=>{
          db.collection('riders').doc(r.uid).update({ riderCode: code }).catch(()=>{});
        });
      }
      const actions = el.querySelector('[data-actions]');
      if(r.status === 'pending'){
        const approveBtn = document.createElement('button'); approveBtn.className='btn btn-primary btn-sm'; approveBtn.textContent='Approve';
        approveBtn.addEventListener('click', async ()=>{
          const riderCode = r.riderCode || await generateUniqueRiderCode();
          await db.collection('riders').doc(r.uid).update({status:'approved', riderCode});
          await notifyUser(r.uid,"You're approved!",`You can now go online and start accepting rides on Zrider. Your Rider ID is ${riderCode} — share it with users who ask to verify you.`);
          toast('Rider approved.', 'ok'); aLoadRidersList();
        });
        const rejectBtn = document.createElement('button'); rejectBtn.className='btn btn-outline btn-sm'; rejectBtn.style.color='var(--red-600)'; rejectBtn.style.borderColor='var(--red-600)'; rejectBtn.textContent='Reject';
        rejectBtn.addEventListener('click', async ()=>{
          const reason = prompt('Reason for rejection (shown to the rider):') || 'Documents could not be verified.';
          await db.collection('riders').doc(r.uid).update({status:'rejected', rejectionReason:reason});
          await notifyUser(r.uid,'Application not approved', reason);
          toast('Rider rejected.'); aLoadRidersList();
        });
        actions.append(approveBtn, rejectBtn);
      } else if(r.status === 'approved'){
        const suspendBtn = document.createElement('button'); suspendBtn.className='btn btn-outline btn-sm'; suspendBtn.style.color='var(--red-600)'; suspendBtn.style.borderColor='var(--red-600)'; suspendBtn.textContent='Suspend';
        suspendBtn.addEventListener('click', async ()=>{ await db.collection('riders').doc(r.uid).update({status:'rejected', rejectionReason:'Suspended by admin.', online:false}); toast('Rider suspended.'); aLoadRidersList(); });
        actions.append(suspendBtn);
      } else if(r.status === 'rejected'){
        const reinstateBtn = document.createElement('button'); reinstateBtn.className='btn btn-primary btn-sm'; reinstateBtn.textContent='Reinstate';
        reinstateBtn.addEventListener('click', async ()=>{ await db.collection('riders').doc(r.uid).update({status:'approved'}); toast('Rider reinstated.', 'ok'); aLoadRidersList(); });
        actions.append(reinstateBtn);
      }
      list.appendChild(el);
    });
  }catch(e){ list.innerHTML = `<div class="empty-state"><p>Couldn't load riders.</p></div>`; }
}

// ---- Pricing ----
function aRenderPricing(){
  const c = $('a-screen-pricing'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-pricing'));
  $('a-price-base').value = fareRules.baseFare;
  $('a-price-perkm').value = fareRules.perKm;
  $('a-price-permin').value = fareRules.perMin;
  $('a-price-min').value = fareRules.minFare;
  $('a-save-pricing').addEventListener('click', async ()=>{
    const updated = Object.assign({}, fareRules, {
      baseFare: parseFloat($('a-price-base').value)||0,
      perKm: parseFloat($('a-price-perkm').value)||0,
      perMin: parseFloat($('a-price-permin').value)||0,
      minFare: parseFloat($('a-price-min').value)||0
    });
    await db.collection('settings').doc('fareRules').set(updated);
    fareRules = updated;
    toast('Pricing rules saved.', 'ok');
  });

  // ---- Rider & company split (rider % / company % always sum to 100) ----
  const riderInput = $('a-split-rider');
  const companyInput = $('a-split-company');
  const preview = $('a-split-preview');
  const companyPct = fareRules.commissionPct != null ? fareRules.commissionPct : 15;
  riderInput.value = Math.round((100 - companyPct)*10)/10;
  companyInput.value = Math.round(companyPct*10)/10;

  function updatePreview(){
    const companyPctNow = parseFloat(companyInput.value) || 0;
    const riderShare = Math.round(1000 * (100 - companyPctNow) / 100);
    const companyShare = 1000 - riderShare;
    preview.textContent = `Rider keeps ₦${riderShare.toLocaleString()} · Company keeps ₦${companyShare.toLocaleString()}`;
  }
  riderInput.addEventListener('input', ()=>{
    let v = Math.min(100, Math.max(0, parseFloat(riderInput.value) || 0));
    companyInput.value = Math.round((100 - v)*10)/10;
    updatePreview();
  });
  companyInput.addEventListener('input', ()=>{
    let v = Math.min(100, Math.max(0, parseFloat(companyInput.value) || 0));
    riderInput.value = Math.round((100 - v)*10)/10;
    updatePreview();
  });
  updatePreview();

  $('a-save-split').addEventListener('click', async ()=>{
    const companyPctNew = Math.min(100, Math.max(0, parseFloat(companyInput.value) || 0));
    const updated = Object.assign({}, fareRules, { commissionPct: companyPctNew });
    await db.collection('settings').doc('fareRules').set(updated);
    fareRules = updated;
    toast(`Split saved — riders now keep ${(100-companyPctNew).toFixed(0)}%, company keeps ${companyPctNew.toFixed(0)}% on every trip.`, 'ok');
  });
}

async function aLoadAllTransactions(box){

  }
  allTx.sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
  if(!allTx.length){ box.innerHTML='<div class="empty-state"><p>No transactions yet.</p></div>'; return; }
  allTx.slice(0,60).forEach(tx=>{
    const el = document.createElement('div'); el.className='card'; el.style.marginBottom='8px';
    const isCredit = tx.type==='credit';
    el.innerHTML=`<div class="row"><div><strong style="font-size:13px;">${tx.userName}</strong><p class="muted" style="font-size:11px;">${tx.description}</p></div>
      <span class="meter" style="color:${isCredit?'var(--amber-500)':'var(--red-600)'}">${isCredit?'+':'-'}${fmtNaira(tx.amount)}</span></div>
      <p class="muted" style="font-size:11px;margin-top:4px;">${timeAgo(tx.createdAt)}</p>`;
    box.appendChild(el);
  });
}

  box.innerHTML=`<div class="card" style="margin-top:14px;">
    <div class="zr-eyebrow">MANUAL WALLET ADJUSTMENT</div>
    <div class="field" style="margin-top:12px;"><label>User email or UID</label><input type="text" id="mc-user" placeholder="Email address"></div>
    <div class="field"><label>Amount (₦)</label><input type="number" id="mc-amount" placeholder="e.g. 1000"></div>
    <div class="field"><label>Type</label><select id="mc-type"><option value="credit">Credit (add money)</option><option value="debit">Debit (remove money)</option></select></div>
    <div class="field"><label>Description</label><input type="text" id="mc-desc" placeholder="Reason for adjustment"></div>
    <button class="btn btn-primary" id="mc-submit">Apply adjustment</button>
    <p id="mc-msg" style="margin-top:8px;font-size:12px;"></p></div>`;
  box.querySelector('#mc-submit').addEventListener('click', async ()=>{
    const emailOrId = box.querySelector('#mc-user').value.trim();
    const amount = parseFloat(box.querySelector('#mc-amount').value);
    const type = box.querySelector('#mc-type').value;
    const desc = box.querySelector('#mc-desc').value.trim() || 'Admin adjustment';
    const msg = box.querySelector('#mc-msg');
    if(!emailOrId || !amount || amount<=0){ msg.textContent='Fill all fields.'; return; }
    let uid = emailOrId;
    if(emailOrId.includes('@')){
      const uSnap = await db.collection('users').where('email','==',emailOrId).limit(1).get();
      if(uSnap.empty){ msg.textContent='User not found.'; return; }
      uid = uSnap.docs[0].id;
    }
    try{
      if(type==='credit') await creditWallet(uid, amount, desc, { byAdmin:true });
      else await debitWallet(uid, amount, desc, { byAdmin:true });
      await notifyUser(uid, type==='credit'?'💰 Wallet credited':'Wallet adjusted', `${type==='credit'?fmtNaira(amount)+' has been added to':''+fmtNaira(amount)+' has been removed from'} your wallet by admin. Reason: ${desc}`);
      msg.style.color='var(--amber-500)'; msg.textContent=`${type==='credit'?'Credited':'Debited'} ${fmtNaira(amount)} successfully.`;
    }catch(e){ msg.style.color='var(--red-600)'; msg.textContent=e.message||'Failed.'; }
  });
}

// ---- Admin: Referral Management ----
async function aRenderReferrals(){
  const c = $('a-screen-referrals'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-referrals'));
  $('a-ref-enabled').value = String(referralSettings.enabled);
  $('a-ref-reward').value = referralSettings.rewardAmount;
  $('a-ref-condition').value = referralSettings.condition;
  $('a-ref-auto').value = String(referralSettings.autoApprove);
  $('a-save-ref-settings').addEventListener('click', async ()=>{
    const updated = {
      enabled: $('a-ref-enabled').value === 'true',
      rewardAmount: parseFloat($('a-ref-reward').value)||500,
      condition: $('a-ref-condition').value,
      autoApprove: $('a-ref-auto').value === 'true'
    };
    await db.collection('settings').doc('referral').set(updated);
    Object.assign(referralSettings, updated);
    toast('Referral settings saved.','ok');
  });
  const list = $('a-ref-list');
  list.innerHTML='<div class="skel" style="height:60px;"></div>';
  try{
    const snap = await db.collection('referrals').orderBy('createdAt','desc').get();
    if(snap.empty){ list.innerHTML='<div class="empty-state"><p>No referrals yet.</p></div>'; return; }
    list.innerHTML='';
    snap.forEach(d=>{
      const r = Object.assign({id:d.id},d.data());
      const pillCls = r.status==='rewarded'?'pill-green':r.status==='pending_approval'?'pill-amber':'pill-grey';
      const el = document.createElement('div'); el.className='card'; el.style.marginBottom='8px';
      el.innerHTML=`<div class="row"><strong>${r.refereeName}</strong><span class="pill ${pillCls}">${r.status.replace('_',' ')}</span></div>
        <p class="muted" style="font-size:12px;margin-top:4px;">Reward: ${fmtNaira(r.reward||0)} · ${timeAgo(r.createdAt)}</p>
        <div data-actions></div>`;
      if(r.status==='pending_approval'){
        const approveBtn = document.createElement('button'); approveBtn.className='btn btn-primary btn-sm'; approveBtn.style.marginTop='8px'; approveBtn.textContent='Approve reward';
        approveBtn.addEventListener('click', async ()=>{
          await db.collection('referrals').doc(r.id).update({ status:'rewarded', awardedAt: FieldValue.serverTimestamp() });
          await creditWallet(r.referrerId, r.reward||referralSettings.rewardAmount, `Referral reward — ${r.refereeName}`, { referralId:r.id });
          await notifyUser(r.referrerId,'🎉 Referral reward approved!',`Your referral reward of ${fmtNaira(r.reward||referralSettings.rewardAmount)} has been credited.`);
          toast('Reward approved and credited.','ok'); aRenderReferrals();
        });
        el.querySelector('[data-actions]').appendChild(approveBtn);
      }
      list.appendChild(el);
    });
  }catch(e){ list.innerHTML='<div class="empty-state"><p>Could not load referrals.</p></div>'; }
}
</script>
