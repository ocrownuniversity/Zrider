<!DOCTYPE html>

<script>
  // Captured as the very first thing on the page, before anything else
  // loads. Chrome can fire 'beforeinstallprompt' the instant it decides a
  // page is installable — sometimes before the rest of our app's script
  // (loaded near the end of the page) even runs. Attaching this listener
  // here, first, means we never miss that event no matter how fast it
  // fires. The main app script below picks this up in setupPWA().
  window.__zrDeferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    window.__zrDeferredInstallPrompt = e;
  });
</script>

<style>
:root{
  /* === Zrider Theme (Opay-style green) === */
  --green-900:#0E3B22; --green-700:#14502E; --green-600:#1B6B3D; --green-100:#1F7A45;
  --amber-500:#FFB100; --amber-600:#E69E00; --amber-100:#2a2200;
  --ink-900:#F2F2F2; --ink-700:#CFE3D6; --ink-400:#A7C9B5; --ink-200:#3F5F4C;
  --surface-0:#14502E; --surface-1:#0E3B22; --surface-2:#1F7A45;
  --red-600:#E64539; --red-100:#2d1210;
  /* Dedicated input/field colors — deliberately NOT the same as the dark
     green card surfaces, so every text field, textarea, and select stands
     out clearly against any card, modal, or sheet in the app instead of
     blending into the background. */
  --field-bg:#F4F8F5; --field-text:#0E241A; --field-border:#B9CCC0;
  --field-border-focus:var(--amber-500); --field-placeholder:#5C7268;
  --radius-s:10px; --radius-m:16px; --radius-l:24px;
  --shadow-card:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.5);
  --shadow-pop:0 12px 40px rgba(0,0,0,.7);
  --font-display:'Plus Jakarta Sans',system-ui,sans-serif; --font-body:'Inter',system-ui,sans-serif; --font-mono:'JetBrains Mono',monospace;
  --fs-base:17px; --fs-h1:32px; --fs-h2:24px; --fs-h3:19px; --fs-body:16px; --fs-label:14px; --fs-small:14px;
  /* accent colours kept for interactive elements */
  --accent:#FFB100;
  --accent-dim:#2a2200;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:#0E3B22;}
body{font-family:var(--font-body);font-size:var(--fs-base);line-height:1.5;color:var(--ink-900);-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
button{font-family:inherit;} input,select,textarea{font-family:inherit;color:var(--field-text);background:var(--field-bg);border-color:var(--field-border);}
::selection{background:var(--amber-100);} a{color:inherit;}
.hidden{display:none !important;} .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}

#zr-root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--surface-1);position:relative;overflow-x:hidden;display:flex;flex-direction:column;}
@media (min-width:481px){body{display:flex;justify-content:center;background:#0a1210;} #zr-root{box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 30px 80px rgba(0,0,0,.5);}}

.route-stripe{height:4px;width:100%;background:repeating-linear-gradient(90deg, var(--amber-500) 0 14px, transparent 14px 24px);border-radius:2px;}
.route-stripe.vert{width:4px;height:100%;background:repeating-linear-gradient(180deg, var(--amber-500) 0 14px, transparent 14px 24px);}

h1,h2,h3,.zr-display{font-family:var(--font-display);font-weight:700;color:var(--ink-900);margin:0;letter-spacing:-.01em;line-height:1.2;}
h1{font-size:var(--fs-h1);} h2{font-size:var(--fs-h2);} h3{font-size:var(--fs-h3);}
.zr-eyebrow{font-family:var(--font-mono);font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--amber-500);font-weight:700;}
p{margin:0;line-height:1.55;font-size:var(--fs-body);} .muted{color:var(--ink-400);font-size:var(--fs-small);}
.meter{font-family:var(--font-mono);font-weight:700;letter-spacing:.02em;font-variant-numeric:tabular-nums;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius-s);font-family:var(--font-body);font-weight:600;font-size:16px;padding:15px 18px;cursor:pointer;transition:transform .12s ease, opacity .15s ease;width:100%;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--amber-500);color:#000;} .btn-primary:hover{background:var(--amber-600);}
.btn-amber{background:var(--amber-500);color:#000;} .btn-amber:hover{background:var(--amber-600);}
.btn-outline{background:transparent;color:var(--amber-500);border:1.5px solid var(--amber-500);}
.btn-ghost{background:transparent;color:var(--ink-700);}
.btn-danger{background:var(--red-600);color:#fff;}
.btn-sm{padding:10px 14px;font-size:14px;width:auto;}
.btn-block-row{display:flex;gap:10px;}
.btn[disabled]{opacity:.4;pointer-events:none;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:var(--fs-label);font-weight:600;color:var(--ink-700);margin-bottom:6px;letter-spacing:.01em;}
.field input, .field select, .field textarea{width:100%;padding:14px;border-radius:var(--radius-s);border:1.5px solid var(--field-border);background:var(--field-bg);font-size:16px;color:var(--field-text);outline:none;transition:border-color .15s, box-shadow .15s;}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--field-border-focus);box-shadow:0 0 0 3px rgba(255,177,0,.18);}
.field input::placeholder, .field textarea::placeholder{color:var(--field-placeholder);}
.field .hint{font-size:13px;color:var(--ink-400);margin-top:4px;}

.card{background:var(--surface-0);border-radius:var(--radius-m);padding:16px;box-shadow:var(--shadow-card);border:1px solid var(--surface-2);}
.card + .card{margin-top:12px;}

.pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:6px 11px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.pill-green{background:rgba(255,177,0,.15);color:var(--amber-500);}
.pill-amber{background:rgba(255,177,0,.12);color:var(--amber-500);}
.pill-red{background:var(--red-100);color:var(--red-600);}
.pill-grey{background:var(--surface-2);color:var(--ink-400);}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface-0);position:sticky;top:0;z-index:30;border-bottom:1px solid var(--surface-2);}
.topbar .brand{display:flex;align-items:center;gap:8px;}
.brand-mark{width:30px;height:30px;border-radius:8px;background:var(--amber-500);display:flex;align-items:center;justify-content:center;color:#000;font-family:var(--font-display);font-weight:800;font-size:15px;}

.bottomnav{position:sticky;bottom:0;z-index:30;display:flex;background:var(--surface-0);border-top:1px solid var(--surface-2);padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:8px 2px;color:var(--ink-400);font-size:12px;font-weight:600;cursor:pointer;border-radius:10px;}
.bottomnav button.active{color:var(--amber-500);}
.bottomnav button svg{width:21px;height:21px;}
.bottomnav button{position:relative;}
.nav-badge{position:absolute;top:2px;right:calc(50% - 20px);min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--red-600);color:#fff;font-size:10px;font-weight:800;line-height:16px;text-align:center;box-shadow:0 0 0 2px var(--surface-0);}

.screen{flex:1;display:flex;flex-direction:column;min-height:0;}
.screen-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:24px;}

.map-wrap{position:relative;width:100%;height:260px;background:var(--surface-2);overflow:hidden;}
.map-wrap .gmap{width:100%;height:100%;}
.map-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--ink-400);font-size:12px;text-align:center;padding:20px;background:repeating-linear-gradient(135deg, #1B6B3D 0 12px, #0E3B22 12px 24px);}

.sheet{background:var(--surface-0);border-radius:var(--radius-l) var(--radius-l) 0 0;margin-top:-20px;position:relative;z-index:2;box-shadow:0 -6px 40px rgba(0,0,0,.6);padding:18px 16px 16px;flex:1;border-top:1px solid var(--surface-2);}
.sheet-handle{width:36px;height:4px;background:var(--surface-2);border-radius:2px;margin:0 auto 14px;}

.auth-screen{min-height:100vh;display:flex;flex-direction:column;background:#0E3B22;color:#fff;}
.auth-hero{padding:48px 24px 24px;background:linear-gradient(160deg,#1B6B3D 0%,#0E3B22 60%);}
.auth-hero .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.auth-hero .brand-mark{background:var(--amber-500);color:#000;}
.auth-hero h1{color:#fff;font-size:34px;line-height:1.15;}
.auth-hero p{color:rgba(255,255,255,.6);margin-top:8px;font-size:16px;}
.auth-card{background:var(--surface-0);border-radius:var(--radius-l) var(--radius-l) 0 0;flex:1;padding:24px;margin-top:20px;border-top:1px solid var(--surface-2);}
.role-toggle{display:flex;gap:8px;background:var(--surface-2);padding:4px;border-radius:var(--radius-s);margin-bottom:18px;}
.role-toggle button{flex:1;border:none;background:none;padding:10px;border-radius:8px;font-weight:600;font-size:14.5px;color:var(--ink-400);cursor:pointer;}
.role-toggle button.active{background:var(--amber-500);color:#000;box-shadow:0 2px 8px rgba(255,177,0,.3);}
.tab-link{text-align:center;font-size:14.5px;color:var(--ink-400);margin-top:16px;}
.tab-link b{color:var(--amber-500);cursor:pointer;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:90;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
@media (min-width:481px){.overlay{justify-content:center;}}
.modal{background:var(--surface-0);width:100%;max-width:480px;border-radius:var(--radius-l) var(--radius-l) 0 0;padding:20px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-pop);animation:slideup .22s ease;border-top:1px solid var(--surface-2);}
@keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-close{background:var(--surface-2);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--ink-700);}

#zr-toasts{position:fixed;top:14px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none;}
.toast{background:var(--surface-2);color:var(--ink-900);font-size:14.5px;font-weight:500;padding:11px 17px;border-radius:999px;box-shadow:var(--shadow-pop);max-width:88%;text-align:center;border:1px solid var(--surface-2);}
.toast.err{background:var(--red-600);color:#fff;border-color:var(--red-600);}
.toast.ok{background:var(--amber-500);color:#000;border-color:var(--amber-500);}

.row{display:flex;align-items:center;justify-content:space-between;} .row.gap{gap:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--surface-2);color:var(--amber-500);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display);overflow:hidden;flex-shrink:0;border:1.5px solid var(--surface-2);}
.avatar img{width:100%;height:100%;object-fit:cover;}
.divider{height:1px;background:var(--surface-2);margin:14px 0;}
.empty-state{text-align:center;padding:40px 16px;color:var(--ink-400);}
.empty-state svg{width:48px;height:48px;color:var(--ink-200);margin-bottom:10px;}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
.spinner.dark{border-color:var(--surface-2);border-top-color:var(--amber-500);}
@keyframes spin{to{transform:rotate(360deg);}}
.skel{background:linear-gradient(90deg,var(--surface-2) 25%,#2a2a2a 37%,var(--surface-2) 63%);background-size:400% 100%;animation:skel 1.4s ease infinite;border-radius:8px;}
@keyframes skel{0%{background-position:100% 50%}100%{background-position:0 50%}}
.badge-verify{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:var(--amber-500);}
.tabs-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.tabs-row::-webkit-scrollbar{display:none;}
.tabs-row button{flex-shrink:0;border:1.5px solid var(--surface-2);background:var(--surface-0);padding:9px 15px;border-radius:999px;font-size:14px;font-weight:600;color:var(--ink-700);cursor:pointer;}
.tabs-row button.active{background:var(--amber-500);color:#000;border-color:var(--amber-500);}
.stat-box{background:var(--surface-0);border-radius:var(--radius-m);padding:18px;color:var(--ink-900);border:1px solid var(--surface-2);position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--amber-500);}
.stat-box .meter{font-size:28px;color:var(--amber-500);}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-700);}
.fab{position:absolute;bottom:18px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--red-600);color:#fff;border:none;box-shadow:var(--shadow-pop);font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;}
.list-item + .list-item{border-top:1px solid var(--surface-2);}
.doc-row{display:flex;align-items:center;justify-content:space-between;border:1.5px dashed var(--surface-2);border-radius:var(--radius-s);padding:12px;margin-bottom:10px;}
.star-row{display:flex;gap:4px;}
.star-row svg{width:26px;height:26px;cursor:pointer;color:var(--surface-2);}
.star-row svg.on{color:var(--amber-500);}

/* Glowing amber accent line under active nav items */
.bottomnav button.active::after{content:'';display:block;width:18px;height:2px;background:var(--amber-500);border-radius:1px;margin-top:1px;box-shadow:0 0 6px var(--amber-500);}

/* Input search boxes in admin */
#a-rider-search, #a-passenger-search{background:var(--field-bg);border:1.5px solid var(--field-border);color:var(--field-text);}
#a-rider-search:focus, #a-passenger-search:focus{border-color:var(--amber-500);outline:none;}
#a-rider-search::placeholder, #a-passenger-search::placeholder{color:var(--ink-400);}

/* ============================================================================
   READABILITY UPGRADE
   Many small text elements throughout the templates use inline font-size
   styles (set at design time when the app targeted a small, fixed body copy
   size). Rather than rewriting every inline style by hand, the rules below
   bump each of those specific inline pixel sizes up a notch so the whole
   app reads comfortably larger, while preserving the original layout
   proportions and hierarchy. Larger inline sizes (icons/emoji/big numbers)
   are intentionally left untouched.
   ========================================================================= */
[style*="font-size:9.5px"]{font-size:12px !important;}
[style*="font-size:10px"]{font-size:12.5px !important;}
[style*="font-size:10.5px"]{font-size:13px !important;}
[style*="font-size:11px"]{font-size:13.5px !important;}
[style*="font-size:12px"]{font-size:14.5px !important;}
[style*="font-size:12.5px"]{font-size:15px !important;}
[style*="font-size:13px"]{font-size:15.5px !important;}
[style*="font-size:13.5px"]{font-size:16px !important;}
[style*="font-size:14px"]{font-size:16.5px !important;}
[style*="font-size:15px"]{font-size:17px !important;}
[style*="font-size:16px"]{font-size:17.5px !important;}
[style*="font-size:17px"]{font-size:18.5px !important;}
[style*="font-size:18px"]{font-size:19.5px !important;}

/* ---------- MOBILE RESPONSIVENESS ---------- */
@media (max-width:380px){
  :root{ --fs-h1:28px; --fs-h2:21px; --fs-h3:18px; }
  .auth-hero h1{font-size:29px;}
  .screen-body{padding:14px;}
  .btn{padding:14px 16px;}
}
@media (min-width:481px){
  html{ -webkit-text-size-adjust:100%; }
}

/* ---------- FREE ADDRESS AUTOCOMPLETE DROPDOWN ---------- */
.zr-suggest-list{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--surface-0);border:1.5px solid var(--surface-2);border-radius:var(--radius-s);box-shadow:var(--shadow-pop);z-index:40;max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.zr-suggest-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;padding:11px 12px;cursor:pointer;font-size:14.5px;color:var(--ink-900);border-bottom:1px solid var(--surface-2);}
.zr-suggest-item:last-child{border-bottom:none;}
.zr-suggest-item:hover, .zr-suggest-item:active{background:var(--surface-2);}
.zr-suggest-tag{flex-shrink:0;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--amber-500);background:var(--amber-100);border-radius:5px;padding:3px 6px;}
.zr-suggest-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ---------- PWA INSTALL UI ---------- */
.zr-install-btn{display:flex;align-items:center;gap:6px;background:var(--amber-500);color:#000;border:none;border-radius:999px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
.zr-install-btn:active{transform:scale(.96);}
</style>
</head>
<body>
<div id="zr-toasts"></div>
<div id="zr-root">
  <!-- Screens injected below -->
</div>

<!-- ================= TEMPLATES (cloned into #zr-root by JS) ================= -->
<template id="tpl-loading">
  <div class="auth-screen" style="align-items:center;justify-content:center;">
    <div class="brand-mark" style="width:56px;height:56px;font-size:26px;background:var(--amber-500);color:var(--green-900);">Z</div>
    <p style="color:rgba(255,255,255,.7);margin-top:14px;font-size:13px;">Loading Zrider…</p>
  </div>
</template>

<!-- ===== AUTH ===== -->
<template id="tpl-auth">
  <div class="auth-screen">
    <div class="auth-hero">
      <div class="brand-row" style="justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="brand-mark">Z</div>
          <span class="zr-eyebrow" style="color:var(--amber-500);">ZRIDER</span>
        </div>
        <button class="zr-install-btn hidden" id="zr-install-btn-auth">⬇ Install App</button>
      </div>
      <h1>Bike rides across Ogun State, on demand.</h1>
      <p>Quick okada pickups, fair meter pricing, anywhere in Ogun State.</p>
      <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
        <div style="flex:1;min-width:80px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 10px;text-align:center;">
          <div style="font-size:20px;">📍</div>
          <p style="font-size:11px;color:rgba(255,255,255,.7);margin-top:6px;font-weight:600;">Set pickup</p>
        </div>
        <div style="flex:1;min-width:80px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 10px;text-align:center;">
          <div style="font-size:20px;">🏍️</div>
          <p style="font-size:11px;color:rgba(255,255,255,.7);margin-top:6px;font-weight:600;">Rider arrives</p>
        </div>
        <div style="flex:1;min-width:80px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 10px;text-align:center;">
          <div style="font-size:20px;">✅</div>
          <p style="font-size:11px;color:rgba(255,255,255,.7);margin-top:6px;font-weight:600;">Arrive & pay</p>
        </div>
      </div>

function setupPWA(){
  // Register service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => {
        // Check for updates in background
        reg.addEventListener('updatefound', ()=>{
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', ()=>{
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              toast('Zrider updated — refresh to get the latest.','ok');
            }
          });
        });
      })
      .catch(err => console.warn('SW registration failed:', err));
  }

  if(IS_STANDALONE){ return; } // already installed — never show install UI

  // Pick up an install prompt that may have already fired before this
  // script even ran (captured by the tiny inline script at the very top
  // of <head>) — this is the fix for the prompt being missed on fast
  // page loads.
  if(window.__zrDeferredInstallPrompt){
    deferredInstallPrompt = window.__zrDeferredInstallPrompt;
  }

  // Also keep listening directly, in case it fires later (e.g. Chrome
  // takes a moment to finish its installability checks on a first visit).
  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredInstallPrompt = e;
    window.__zrDeferredInstallPrompt = e;
    showInstallBanner();
    showInstallButtons();
  });

  window.addEventListener('appinstalled', ()=>{
    deferredInstallPrompt = null;
    const b = document.getElementById('zr-install-banner');
    if(b) b.remove();
    hideInstallButtons();
    toast('Zrider installed! Find it on your home screen.','ok');
  });

  // iOS Safari never fires beforeinstallprompt, but "Add to Home Screen"
  // still works there via the Share sheet — so still surface a button
  // that opens step-by-step instructions instead of a native prompt.
  if(IS_IOS) showInstallButtons();

  // Wire every install button already in the DOM (topbar + auth screen).
  // A MutationObserver keeps newly-mounted screens' buttons wired too,
  // since templates are re-cloned into the DOM on navigation.
  wireInstallButtons();
  const mo = new MutationObserver(()=> wireInstallButtons());
  mo.observe(document.getElementById('zr-root') || document.body, { childList:true, subtree:true });
}

function showInstallButtons(){
  INSTALL_BTN_IDS.forEach(id=>{ const b = document.getElementById(id); if(b) b.classList.remove('hidden'); });
}
function hideInstallButtons(){
  INSTALL_BTN_IDS.forEach(id=>{ const b = document.getElementById(id); if(b) b.classList.add('hidden'); });
}
function wireInstallButtons(){
  INSTALL_BTN_IDS.forEach(id=>{
    const b = document.getElementById(id);
    if(!b) return;
    // Always discoverable (not just after the browser fires
    // beforeinstallprompt) — tapping it either triggers the native
    // install prompt if it's ready, or opens free step-by-step
    // instructions otherwise. Never shown once already installed.
    b.classList.remove('hidden');
    if(b.dataset.wired) return;
    b.dataset.wired = '1';
    b.addEventListener('click', onInstallButtonClick);
  });
}
async function onInstallButtonClick(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    if(outcome !== 'accepted') showInstallButtons(); // keep offering if dismissed
    return;
  }
  showInstallInstructionsModal();
}

function initials(name){
  if(!name) return '?';
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function timeAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.floor((Date.now() - d.getTime())/1000);
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60)+'m ago';
  if(diff < 86400) return Math.floor(diff/3600)+'h ago';
  return d.toLocaleDateString();
}
// Renders a simple horizontal progress stepper (e.g. Accepted → Arriving → In progress → Completed).
function renderStepper(containerEl, steps, currentKey){

      const done = i < idx, active = i === idx;
      const color = (done||active) ? 'var(--green-700)' : 'var(--surface-2)';
      const textColor = (done||active) ? 'var(--ink-900)' : 'var(--ink-400)';
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">
        <div style="width:100%;display:flex;align-items:center;">
          <div style="flex:1;height:3px;background:${i===0?'transparent':color};"></div>
          <div style="width:12px;height:12px;border-radius:50%;background:${color};flex-shrink:0;${active?'box-shadow:0 0 0 4px '+ (done?'transparent':'var(--green-100)')+';':''}"></div>

// ---------- GEO / FARE ----------
function toRad(d){ return d * Math.PI / 180; }
function haversineKm(lat1,lng1,lat2,lng2){
  const R = 6371;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============================================================================
// FREE ROUTING & GEOCODING INFRASTRUCTURE (OpenStreetMap Nominatim + OSRM)
// ============================================================================
// Everything below is designed to squeeze the most accuracy and reliability
// out of 100% free, keyless services: OSM Nominatim for geocoding/search,
// and the public OSRM demo server for real road-network routing. No paid
// API (Google/Mapbox/HERE/TomTom) is used anywhere in this app.

// Wraps fetch() with a hard timeout so a slow/overloaded free server can
// never hang the UI — critical on slow mobile connections. Aborts and
// throws instead of waiting indefinitely.
async function fetchWithTimeout(url, opts={}, timeoutMs=7000){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), timeoutMs);
  try{
    return await fetch(url, Object.assign({}, opts, { signal: controller.signal }));
  } finally {
    clearTimeout(timer);
  }
}
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

// Simple TTL caches (in-memory, per session) so repeated identical lookups
// — re-typing the same place, re-selecting a recent destination, retrying
// after a network blip — don't re-hit the free Nominatim/OSRM servers.
// This both speeds up the app and is good citizenship on shared free
// infrastructure that has fair-use rate limits.
const GEOCODE_CACHE_TTL_MS = 10 * 60 * 1000; // 10 minutes
const ROUTE_CACHE_TTL_MS = 10 * 60 * 1000;
const _geocodeCache = new Map(); // normalized query -> { value, ts }
const _routeCache = new Map();   // "lat,lng,lat,lng" (rounded) -> { value, ts }
function cacheGet(map, key, ttlMs){
  const e = map.get(key);
  if(e && (Date.now() - e.ts) < ttlMs) return e.value;
  if(e) map.delete(key);
  return null;
}
function cacheSet(map, key, value){
  map.set(key, { value, ts: Date.now() });
  // Keep the cache small on long sessions — drop the oldest entry once we
  // pass a reasonable cap instead of growing unbounded.
  if(map.size > 200){ map.delete(map.keys().next().value); }
}
// Rough outer bounds of Ogun State, used as a cheap first-pass reject
// before running the more expensive per-zone haversine loop below.
const SERVICE_BOUNDS = { minLat:6.4, maxLat:7.6, minLng:2.5, maxLng:4.3 };
// Same box expressed as a Nominatim viewbox string: left,top,right,bottom (lng,lat)
const SERVICE_VIEWBOX = `${SERVICE_BOUNDS.minLng},${SERVICE_BOUNDS.maxLat},${SERVICE_BOUNDS.maxLng},${SERVICE_BOUNDS.minLat}`;

// Riders don't need to see the bureaucratic "LGA" tag in the address text —
// it's only meaningful internally for zone lookups and admin screens. This
// strips the word "LGA" (and the spelled-out "Local Government Area", in
// case a remote Nominatim result ever includes it) purely for display, e.g.
// "Abeokuta North LGA (Ogun)" -> "Abeokuta North (Ogun)". The underlying
// zone.name (used for matching, admin screens, etc.) is left completely
// untouched — this only affects what gets rendered in the address text.
function stripLGA(text){
  return (text || '')
    .replace(/\bLocal Government Area\b/gi, '')
    .replace(/\bLGA\b/gi, '')
    .replace(/\s*,\s*,/g, ',')      // collapse any double commas left behind
    .replace(/\s+/g, ' ')
    .replace(/\s+,/g, ',')
    .trim();
}
// Nominatim's display_name is the full address hierarchy: e.g.
// "Osiele, Obafemi Owode, Ogun State, Nigeria" or, for a house-number-level
// match, "5, Adigbe Street, Osiele, Obafemi Owode, Ogun State, Nigeria".
// Riders just want the specific place they typed — no LGA, no state, no
// country — but if they typed a street (or a house number on a street),
// that should still show. So: keep the first segment, and also keep the
// second segment when the first is just a bare house number.
function shortenPlaceLabel(displayName){
  const parts = (displayName || '').split(',').map(p=>p.trim()).filter(Boolean);
  if(!parts.length) return stripLGA(displayName);
  let short = /^\d+[a-zA-Z]?$/.test(parts[0]) && parts.length > 1
    ? parts[0] + ', ' + parts[1]
    : parts[0];
  return stripLGA(short);
}

// ---------- UNIFIED ADDRESS SEARCH (free Nominatim, cached, prioritized) ----------
// Single source of truth for turning what someone types into real
// candidate locations. Used by both the live-typing autocomplete dropdown
// and the "confirm this address" fallback when someone types and leaves
// the field without tapping a suggestion. Always returns an array (never
// auto-picks one) — callers decide what to do with 0, 1, or many results.
async function searchAddress(query){
  const key = (query || '').trim().toLowerCase();
  if(key.length < 2) return [];
  const cached = cacheGet(_geocodeCache, key, GEOCODE_CACHE_TTL_MS);
  if(cached) return cached;
  // Skip the network entirely when we already know we're offline — fail
  // fast instead of waiting out a doomed request on a slow connection.
  if(typeof navigator !== 'undefined' && navigator.onLine === false) return [];
  try{
    const q = encodeURIComponent(key + ', Nigeria');
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=8&addressdetails=1&viewbox=${SERVICE_VIEWBOX}&bounded=0`;
    const res = await fetchWithTimeout(url, { headers:{'Accept-Language':'en'} }, 7000);
    if(!res.ok) return [];
    const data = await res.json();
    let results = (Array.isArray(data) ? data : []).map(d=>{
      const lat = parseFloat(d.lat), lng = parseFloat(d.lon);
      return {
        label: shortenPlaceLabel(d.display_name),
        lat, lng,
        // Prioritize results actually inside our Ogun State coverage —
        // Nominatim's viewbox is only a soft hint, so we re-rank
        // client-side to make sure in-state matches always surface first.
        inCoverage: isInServiceArea(lat, lng)
      };
    }).filter(r => isFinite(r.lat) && isFinite(r.lng));
    results.sort((a,b) => (b.inCoverage === a.inCoverage) ? 0 : (b.inCoverage ? 1 : -1));
    results = results.slice(0, 5); // top 5 only, per design — never more, never auto-picked
    cacheSet(_geocodeCache, key, results);
    return results;
  }catch(e){
    return []; // network error / timeout — caller falls back gracefully
  }
}
function isInServiceArea(lat,lng){
  if(lat==null || lng==null) return false;
  const b = SERVICE_BOUNDS;
  if(lat < b.minLat || lat > b.maxLat || lng < b.minLng || lng > b.maxLng) return false;
  return serviceZones.some(z => haversineKm(lat,lng,z.lat,z.lng) <= z.radiusKm);
}
// Cache the flattened keyword list per serviceZones array so repeated text
// lookups (e.g. while a passenger types) don't rebuild it on every keystroke.
let _zoneKeywordsCache = null, _zoneKeywordsCacheFor = null;
function getAllZoneKeywords(){
  if(_zoneKeywordsCacheFor !== serviceZones){
    _zoneKeywordsCache = serviceZones.flatMap(z => (z.areaKeywords || [z.name]).map(k=>k.toLowerCase()));
    _zoneKeywordsCacheFor = serviceZones;
  }
  return _zoneKeywordsCache;
}
// Fallback when exact coordinates aren't available — checks address text against all zone keywords.
function isLikelyInServiceArea(point){
  if(!point) return false;
  if(point.lat != null && point.lng != null) return isInServiceArea(point.lat, point.lng);
  const text = (point.address || '').toLowerCase();
  return getAllZoneKeywords().some(k => text.includes(k));
}

function computeFare(distanceKm){
  return computeFareBreakdown(distanceKm).total;

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function computeFareBreakdown(distanceKm, durationMin){
  const r = fareRules;
  const estMinutes = (durationMin != null) ? durationMin : distanceKm * 3.2;
  const distCharge = distanceKm * r.perKm;
  const timeCharge = estMinutes * r.perMin;
  let total = r.baseFare + distCharge + timeCharge;
  total = Math.max(total, r.minFare);
  total = Math.round(total/10)*10;
  return { base: Math.round(r.baseFare), distCharge: Math.round(distCharge), timeCharge: Math.round(timeCharge), total, estMinutes: Math.round(estMinutes) };
}

// Fallback position for a zone keyword that has no curated entry above —
// used for any area name an admin adds themselves in the Service Areas
// screen. Without this, every custom keyword added to the same zone
// resolved to that zone's exact center point, so two different custom
// areas in one zone (e.g. two names added to the same zone) looked like
// the identical coordinate. That collapsed pickup/destination onto one
// point, which made the free routing service reject the (zero-length)
// route and silently fall back to the "road route unavailable" straight-
// line estimate seen when picking two such areas. Spreading each keyword
// to its own deterministic point within the zone (same keyword always
// lands on the same spot) keeps areas distinguishable and routable.
function keywordFallbackPosition(kLower, z){
  let hash = 0;
  for(let i=0;i<kLower.length;i++){ hash = ((hash<<5) - hash + kLower.charCodeAt(i)) | 0; }
  const angle = (Math.abs(hash) % 360) * (Math.PI/180);
  const spreadKm = (z.radiusKm || 5) * 0.55; // stay well within the zone
  const dLat = (spreadKm/111) * Math.cos(angle);
  const dLng = (spreadKm/(111 * Math.cos(z.lat * Math.PI/180))) * Math.sin(angle);
  return { lat: z.lat + dLat, lng: z.lng + dLng };
}

//     biased to the Ogun State bounding box.
// This works standalone (MAPS_API_KEY empty) and alongside the optional
// Google Places autocomplete above if a key is ever added later.
function attachFreeAutocomplete(inputEl, onSelect){
  if(!inputEl) return;
  const wrap = inputEl.closest('.field') || inputEl.parentElement;
  if(!wrap) return;
  wrap.style.position = wrap.style.position || 'relative';
  const list = document.createElement('div');
  list.className = 'zr-suggest-list hidden';
  wrap.appendChild(list);

  let debounceTimer = null;
  let activeQuery = '';

  function hideList(){ list.classList.add('hidden'); list.innerHTML = ''; }

  function selectItem(it){
    onSelect({ lat: it.lat, lng: it.lng, address: it.label });
    inputEl.value = it.label;
    hideList();
  }

  function renderSuggestions(items){
    if(!items.length){ hideList(); return; }
    list.innerHTML = items.map((it,i)=>
      `<button type="button" class="zr-suggest-item" data-idx="${i}">
        <span class="zr-suggest-tag">${it.tag}</span>
        <span class="zr-suggest-text">${it.label}</span>
      </button>`
    ).join('');
    list.classList.remove('hidden');
    list.querySelectorAll('.zr-suggest-item').forEach(btn=>{
      btn.addEventListener('mousedown', (e)=>{ // mousedown fires before input blur
        e.preventDefault();
        selectItem(items[parseInt(btn.dataset.idx)]);
      });
    });
  }

  function localMatches(query){
    const q = query.toLowerCase();
    const seen = new Set();
    const out = [];
    for(const z of serviceZones){
      const kws = (z.areaKeywords && z.areaKeywords.length) ? z.areaKeywords : [z.name];
      for(const k of kws){
        const kLower = k.toLowerCase();
        if(kLower.startsWith(q) && !seen.has(kLower)){
          seen.add(kLower);
          const pos = LOCALITY_POSITIONS[kLower] || keywordFallbackPosition(kLower, z);
          out.push({ label: k.replace(/\b\w/g, c=>c.toUpperCase()), lat:pos.lat, lng:pos.lng, tag:'LGA' });
        }
        if(out.length >= 5) break;
      }
      if(out.length >= 5) break;
    }
    return out;
  }

  // Remote suggestions reuse the single shared searchAddress() function —
  // same cache, same timeout handling, same Ogun State prioritization as
  // every other place in the app that geocodes an address, so behavior
  // (and the top-5 cap) stays consistent everywhere.
  async function remoteMatches(query, localLabels){
    const results = await searchAddress(query);
    const mapped = results.map(r => ({ label:stripLGA(r.label), lat:r.lat, lng:r.lng, tag: r.inCoverage ? 'MAP' : 'FAR' }));
    // Drop remote results that are really the same place as a local match
    // we already have a precise, curated point for — a generic Nominatim
    // LGA-boundary centroid can sit several km away from our curated
    // locality point even though it's "the same place", which previously
    // made close-by locations look far apart.
    if(!localLabels || !localLabels.length) return mapped;
    return mapped.filter(r=>{
      const rLower = r.label.toLowerCase();
      return !localLabels.some(l => rLower.includes(l));
    });
  }

  inputEl.addEventListener('input', ()=>{
    const query = inputEl.value.trim();
    activeQuery = query;
    if(query.length < 2){ hideList(); return; }
    // Instant, free, local suggestions first — no waiting on network.
    const firstPassLocal = localMatches(query).slice(0,5);
    renderSuggestions(firstPassLocal);
    // Then debounce a free Nominatim lookup for real addresses.
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async ()=>{
      if(inputEl.value.trim() !== query) return; // stale
      const local = localMatches(query);
      const localCoreLabels = local.map(l => l.label.split(',')[0].toLowerCase());
      const remote = await remoteMatches(query, localCoreLabels);
      if(activeQuery !== query) return; // user kept typing
      // Top 5 total, local (curated/precise) results given priority over
      // generic map results when both exist for the same query.
      renderSuggestions([...local, ...remote].slice(0,5));
    }, 450);
  });
  inputEl.addEventListener('blur', ()=> setTimeout(hideList, 150));
  inputEl.addEventListener('focus', ()=>{ if(inputEl.value.trim().length >= 2) renderSuggestions(localMatches(inputEl.value.trim()).slice(0,5)); });

  // Lets other code (the fare pipeline) force this exact dropdown open
  // with a specific set of candidates when an address is ambiguous —
  // keeps "let the user choose" consistent everywhere, not just while
  // actively typing.
  inputEl._zrForceSuggestions = (options)=>{
    renderSuggestions(options.map(o => ({ label:o.label, lat:o.lat, lng:o.lng, tag: o.inCoverage ? 'MAP' : 'FAR' })));
  };
}

// Bump this whenever DEFAULT_SERVICE_ZONES meaningfully changes (e.g. this
// app used to ship with only 2 zones — Ikeja & Kosofe — restricting rides
// to those two LGAs, then later expanded to all of Lagos + Ogun, and is
// now scoped to Ogun State only). Existing deployments already have a
// `serviceZones` document saved in Firestore from before each of these
// changes, and without a version check that OLD zone list would keep
// overriding the new one forever. Any zones doc saved with an older (or
// missing) version gets auto-upgraded to the current Ogun State coverage
// the next time the app loads. Admin edits made *after* the upgrade are
// stamped with the current version, so they're never clobbered by this
// migration.
const SERVICE_ZONES_VERSION = 3;

// ---------- SETTINGS (fare rules + service area) ----------
let _generalSettingsListenerAttached = false;
function loadSettings(){
  return Promise.all([
    db.collection('settings').doc('fareRules').get(),
    db.collection('settings').doc('serviceZones').get(),
    db.collection('settings').doc('referral').get(),
    db.collection('settings').doc('general').get()
  ]).then(([fr, sz, rf, gs])=>{
    fareRules = fr.exists ? Object.assign({}, DEFAULT_FARE_RULES, fr.data()) : DEFAULT_FARE_RULES;
    if(!fr.exists) db.collection('settings').doc('fareRules').set(DEFAULT_FARE_RULES).catch(()=>{});
    const savedZonesDoc = sz.exists ? sz.data() : null;
    const savedZonesStale = !savedZonesDoc || !(savedZonesDoc.zonesVersion >= SERVICE_ZONES_VERSION);
    if(savedZonesDoc && savedZonesDoc.zones && savedZonesDoc.zones.length && !savedZonesStale){
      serviceZones = savedZonesDoc.zones;
    } else {
      // No saved zones yet, OR the saved zones predate this coverage
      // upgrade (e.g. the old Ikeja & Kosofe-only config) — migrate to
      // the full Ogun State zone list and persist the new version.
      serviceZones = DEFAULT_SERVICE_ZONES.map(z=>Object.assign({},z));
      db.collection('settings').doc('serviceZones').set({ zones: DEFAULT_SERVICE_ZONES, zonesVersion: SERVICE_ZONES_VERSION }).catch(()=>{});
    }
    serviceArea = {
      name: 'Ogun State',
      areaKeywords: serviceZones.flatMap(z=>z.areaKeywords||[z.name]),
      lat: serviceZones[0].lat, lng: serviceZones[0].lng, radiusKm: serviceZones[0].radiusKm
    };
    referralSettings = rf.exists ? Object.assign({}, DEFAULT_REFERRAL_SETTINGS, rf.data()) : DEFAULT_REFERRAL_SETTINGS;
    if(!rf.exists) db.collection('settings').doc('referral').set(DEFAULT_REFERRAL_SETTINGS).catch(()=>{});
    generalSettings = gs.exists ? Object.assign({}, DEFAULT_GENERAL_SETTINGS, gs.data()) : DEFAULT_GENERAL_SETTINGS;
    if(!gs.exists) db.collection('settings').doc('general').set(DEFAULT_GENERAL_SETTINGS).catch(()=>{});
    if(!_generalSettingsListenerAttached){
      _generalSettingsListenerAttached = true;
      db.collection('settings').doc('general').onSnapshot(snap=>{
        if(snap.exists){
          generalSettings = Object.assign({}, DEFAULT_GENERAL_SETTINGS, snap.data());
          renderSupportPhoneEverywhere();
        }
      });
    }
  }).catch(()=>{
    fareRules = DEFAULT_FARE_RULES;
    serviceZones = DEFAULT_SERVICE_ZONES.map(z=>Object.assign({},z));
    serviceArea = { name:'Ogun State', areaKeywords: DEFAULT_SERVICE_ZONES.flatMap(z=>z.areaKeywords||[]), lat:DEFAULT_SERVICE_ZONES[0].lat, lng:DEFAULT_SERVICE_ZONES[0].lng, radiusKm:DEFAULT_SERVICE_ZONES[0].radiusKm };
    referralSettings = Object.assign({}, DEFAULT_REFERRAL_SETTINGS);
    generalSettings = Object.assign({}, DEFAULT_GENERAL_SETTINGS);
  });
}
// Updates every "Call Support" element currently in the DOM (passenger home,
// rider home, verify-rider not-found state) with the latest number — called
// on load and whenever the admin changes it, so no refresh is needed.
function renderSupportPhoneEverywhere(){
  document.querySelectorAll('.support-phone-btn').forEach(el=>{
    el.href = `tel:${generalSettings.supportPhone}`;
    const label = el.querySelector('.support-phone-number');
    if(label) label.textContent = generalSettings.supportPhone;
  });
}

// ---------- BOOTSTRAP / ROUTING ----------
function showLoading(){ mount('tpl-loading'); }

auth.onAuthStateChanged(async (user)=>{
  if(!user){ currentUser=null; currentUserDoc=null; currentRole=null; riderDoc=null; renderAuth(); return; }
  currentUser = user;
  showLoading();
  await loadSettings();
  await routeUser(user);
});

async function routeUser(user){
  let ref = db.collection('users').doc(user.uid);
  let snap;
  try { snap = await ref.get(); } catch(e){ toast('Connection error. Retrying…','err'); setTimeout(()=>routeUser(user),1500); return; }

  if(!snap.exists){
    // Safety net: doc wasn't created (e.g. race condition) — create a minimal one now.
    const fallbackData = {
      name: user.displayName || user.email.split('@')[0],
      email: user.email, phone:'', role: pendingRequestRoleHint || 'passenger',
      rating:5, ratingCount:0, photoURL:'', createdAt: FieldValue.serverTimestamp()
    };
    await ref.set(fallbackData);
    snap = await ref.get();
  }

  let data = snap.data();

  if(data.suspended){
    await auth.signOut();
    toast('Your account has been suspended. Contact Zrider support.', 'err');
    renderAuth();
    return;
  }

  const isAdminEmail = user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
  if(isAdminEmail && data.role !== 'admin'){
    await ref.update({ role:'admin' });
    data.role = 'admin';
  }
  currentUserDoc = data;
  currentRole = data.role;

  if(currentRole === 'admin'){ renderAdminApp(); return; }

  if(currentRole === 'rider'){
    const rsnap = await db.collection('riders').doc(user.uid).get();
    riderDoc = rsnap.exists ? rsnap.data() : null;
    if(!riderDoc){
      await db.collection('riders').doc(user.uid).set({ status:'incomplete', online:false, walletBalance:0, totalEarned:0, totalTrips:0, createdAt: FieldValue.serverTimestamp() });
      riderDoc = { status:'incomplete', online:false, walletBalance:0, totalEarned:0, totalTrips:0 };
    }
    // "Today's earnings/trips" were only ever incremented, never reset, so
    // they silently became a running lifetime total instead of resetting
    // each day. If the stored date isn't today, zero them out here.
    if(riderDoc.todayDate !== todayKey()){
      riderDoc.todayEarnings = 0; riderDoc.todayTrips = 0; riderDoc.todayDate = todayKey();
      db.collection('riders').doc(user.uid).update({ todayEarnings:0, todayTrips:0, todayDate: todayKey() }).catch(()=>{});
    }
    if(riderDoc.status === 'incomplete') renderRiderGate('onboard');
    else if(riderDoc.status === 'pending') renderRiderGate('pending');
    else if(riderDoc.status === 'rejected') renderRiderGate('rejected');
    else renderRiderApp();
    return;
  }

  renderPassengerApp();
}

function doLogout(){
  if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
  clearListeners();
  auth.signOut();
}

// ============================== AUTH SCREEN ==============================
function renderAuth(){
  mount('tpl-auth');
  pendingRequestRoleHint = 'passenger';
  $('auth-role-toggle').addEventListener('click', (e)=>{
    const btn = e.target.closest('button[data-role]');
    if(!btn) return;
    $('auth-role-toggle').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    pendingRequestRoleHint = btn.dataset.role;
  });
  $('go-register').addEventListener('click', ()=>{ $('auth-mode-login').classList.add('hidden'); $('auth-mode-register').classList.remove('hidden'); $('auth-error').textContent=''; });
  $('go-login').addEventListener('click', ()=>{ $('auth-mode-register').classList.add('hidden'); $('auth-mode-login').classList.remove('hidden'); $('auth-error').textContent=''; });

  function wirePasswordToggle(inputId, btnId){
    const input = $(inputId), btn = $(btnId);
    btn.addEventListener('click', ()=>{
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.textContent = showing ? '👁' : '🙈';
    });
  }
  wirePasswordToggle('login-password','login-pw-toggle');
  wirePasswordToggle('reg-password','reg-pw-toggle');

  $('go-forgot').addEventListener('click', ()=>{
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<div class="modal"><div class="modal-head"><h3>Reset your password</h3></div>
      <p class="muted" style="margin-bottom:12px;">We'll email you a link to set a new password.</p>
      <div class="field"><label>Email</label><input type="email" id="forgot-email" placeholder="you@email.com"></div>
      <button class="btn btn-primary" id="forgot-submit">Send reset link</button>
      <p class="muted" id="forgot-msg" style="margin-top:10px;text-align:center;"></p></div>`;
    document.body.appendChild(overlay);
    $('forgot-email').value = $('login-email').value.trim();
    overlay.addEventListener('click', e=>{ if(e.target === overlay) overlay.remove(); });
    overlay.querySelector('#forgot-submit').addEventListener('click', async ()=>{
      const email = overlay.querySelector('#forgot-email').value.trim();
      const msg = overlay.querySelector('#forgot-msg');
      if(!email){ msg.style.color = 'var(--red-600)'; msg.textContent = 'Enter your email first.'; return; }
      try{
        await auth.sendPasswordResetEmail(email);
        msg.style.color = 'var(--green-700)';
        msg.textContent = 'Reset link sent — check your inbox and spam/junk folder.';
      }catch(e){
        msg.style.color = 'var(--red-600)';
        msg.textContent = friendlyAuthError(e);
      }
    });
  });

  $('btn-login').addEventListener('click', async ()=>{
    const email = $('login-email').value.trim();
    const pw = $('login-password').value;
    $('auth-error').textContent = '';
    if(!email || !pw){ $('auth-error').textContent = 'Enter your email and password.'; return; }
    const btn = $('btn-login'); const orig = btn.textContent; btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
    try{
      await auth.signInWithEmailAndPassword(email, pw);
    }catch(e){
      $('auth-error').textContent = friendlyAuthError(e);
      btn.disabled=false; btn.textContent = orig;
    }
  });

  $('btn-register').addEventListener('click', async ()=>{
    const name = $('reg-name').value.trim();
    const email = $('reg-email').value.trim();
    const phone = $('reg-phone').value.trim();
    const pw = $('reg-password').value;
    const refCode = ($('reg-referral').value || '').trim().toUpperCase();
    $('auth-error').textContent = '';
    if(!name || !email || !phone || !pw){ $('auth-error').textContent = 'Please fill in every field.'; return; }
    if(pw.length < 6){ $('auth-error').textContent = 'Password must be at least 6 characters.'; return; }
    const btn = $('btn-register'); const orig = btn.textContent; btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
    try{
      const isAdminEmail = email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
      const role = isAdminEmail ? 'admin' : pendingRequestRoleHint;
      const cred = await auth.createUserWithEmailAndPassword(email, pw);
      const uid = cred.user.uid;
      const myRefCode = generateReferralCode(uid);

      // Resolve referrer if a referral code was entered
      let referrerId = null;
      if(refCode && referralSettings.enabled){
        const refSnap = await db.collection('users').where('referralCode','==',refCode).limit(1).get();
        if(!refSnap.empty && refSnap.docs[0].id !== uid){
          referrerId = refSnap.docs[0].id;
        }
      }

      await db.collection('users').doc(uid).set({
        name, email, phone, role, rating:5, ratingCount:0, photoURL:'',
        referralCode: myRefCode, referredBy: referrerId || null,
        createdAt: FieldValue.serverTimestamp()
      });

      // Create wallet for every user
      await db.collection('wallets').doc(uid).set({ balance:0, updatedAt: FieldValue.serverTimestamp() });

      if(role === 'rider'){
        await db.collection('riders').doc(uid).set({
          status:'incomplete', online:false, walletBalance:0, totalEarned:0, totalTrips:0, createdAt: FieldValue.serverTimestamp()
        });
      }

      // Create pending referral record if referred by someone and condition is signup
      if(referrerId && referralSettings.enabled){
        await db.collection('referrals').add({
          referrerId, refereeName: name, refereeId: uid,
          status: referralSettings.condition === 'signup' ? 'rewarded' : 'pending',
          reward: referralSettings.rewardAmount, createdAt: FieldValue.serverTimestamp()
        });
        if(referralSettings.condition === 'signup'){
          await creditWallet(referrerId, referralSettings.rewardAmount, 'Referral reward — ' + name + ' signed up');
          await notifyUser(referrerId, 'Referral reward!', `${name} signed up with your code. ₦${referralSettings.rewardAmount} added to your wallet.`);
        }
      }
      toast('Welcome to Zrider!', 'ok');
    }catch(e){
      $('auth-error').textContent = friendlyAuthError(e);
      btn.disabled=false; btn.textContent = orig;
    }
  });
}
function friendlyAuthError(e){
  const code = e && e.code || '';
  if(code.includes('email-already-in-use')) return 'That email is already registered. Try logging in.';
  if(code.includes('wrong-password') || code.includes('invalid-credential')) return 'Incorrect email or password.';
  if(code.includes('user-not-found')) return 'No account found with that email.';
  if(code.includes('invalid-email')) return 'That email address looks invalid.';
  if(code.includes('weak-password')) return 'Choose a stronger password (min. 6 characters).';
  if(code.includes('network')) return 'Network error — check your connection and try again.';
  return e && e.message ? e.message : 'Something went wrong. Please try again.';
}

// ============================== RIDER VERIFICATION GATE ==============================
function renderRiderGate(mode){
  mount('tpl-rider-gate');
  $('gate-logout').addEventListener('click', doLogout);
  const body = $('gate-body');
  body.innerHTML = '';

  if(mode === 'onboard'){
    body.appendChild(clone('tpl-r-onboard-form'));
    $('ob-submit').addEventListener('click', submitRiderOnboarding);
  } else {
    body.appendChild(clone('tpl-r-gate-status'));
    if(mode === 'pending'){
      $('gate-icon').textContent = '⏳';
      $('gate-title').textContent = 'Application under review';
      $('gate-message').textContent = "We're verifying your documents and bike details. This usually takes less than 24 hours — we'll notify you once approved.";
    } else if(mode === 'rejected'){
      $('gate-icon').textContent = '✕';
      $('gate-title').textContent = 'Application not approved';
      $('gate-message').textContent = riderDoc && riderDoc.rejectionReason
        ? 'Reason: ' + riderDoc.rejectionReason
        : 'Your documents could not be verified. Contact support or resubmit with clearer documents.';
      const retryBtn = document.createElement('button');
      retryBtn.className = 'btn btn-primary';
      retryBtn.style.marginTop = '14px';
      retryBtn.textContent = 'Resubmit application';
      retryBtn.addEventListener('click', ()=> renderRiderGate('onboard'));
      body.querySelector('.card').appendChild(retryBtn);
    }
  }
}

async function submitRiderOnboarding(){
  const bikeModel = $('ob-bike-model').value.trim();
  const plate = $('ob-plate').value.trim();
  const licenseNo = $('ob-license-no').value.trim();
  const photoFile = $('ob-photo').files[0];
  const licDocFile = $('ob-doc-license').files[0];
  const bikeDocFile = $('ob-doc-bike').files[0];
  $('ob-error').textContent = '';

  if(!bikeModel || !plate || !licenseNo){ $('ob-error').textContent = 'Please fill in all bike & license details.'; return; }
  if(!licDocFile || !bikeDocFile){ $('ob-error').textContent = 'Please upload both required documents.'; return; }

  const btn = $('ob-submit'); const orig = btn.textContent;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Uploading…';

  try{
    const uid = currentUser.uid;
    const uploads = {};
    if(photoFile) uploads.photoURL = await fileToCompressedDataURL(photoFile, 400, 0.7);
    uploads.licenseDocURL = await fileToCompressedDataURL(licDocFile, 1100, 0.6);
    uploads.bikeDocURL = await fileToCompressedDataURL(bikeDocFile, 1100, 0.6);

    await db.collection('riders').doc(uid).set({
      bikeModel, plate, licenseNo,
      ...uploads,
      status: 'pending',
      online: false,
      walletBalance: riderDoc && riderDoc.walletBalance || 0,
      totalEarned: riderDoc && riderDoc.totalEarned || 0,
      totalTrips: riderDoc && riderDoc.totalTrips || 0,
      submittedAt: FieldValue.serverTimestamp(),
      rejectionReason: FieldValue.delete()
    }, { merge:true });

    if(uploads.photoURL){
      await db.collection('users').doc(uid).update({ photoURL: uploads.photoURL });
    }

    toast('Application submitted for review!', 'ok');
    riderDoc = (await db.collection('riders').doc(uid).get()).data();
    renderRiderGate('pending');
  }catch(e){
    $('ob-error').textContent = e.message || 'Upload failed. Please try again.';
    btn.disabled = false; btn.textContent = orig;
  }
}

// Compress + resize an image file in-browser and return a base64 data URL,
// small enough to store directly inside a Firestore document (1MB doc limit).
function fileToCompressedDataURL(file, maxDim, startQuality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file.'));
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = () => reject(new Error('Could not read image.'));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        let q = startQuality || 0.7;
        let dataUrl = canvas.toDataURL('image/jpeg', q);
        // Step quality down until the encoded string comfortably fits in a Firestore field.
        while(dataUrl.length > 320000 && q > 0.25){
          q -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', q);
        }
        resolve(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ============================== WALLET & REFERRAL HELPERS ==============================
function generateReferralCode(uid){
  return 'ZR' + uid.substring(0,6).toUpperCase();
}
async function ensureWallet(uid){
  const ref = db.collection('wallets').doc(uid);
  const snap = await ref.get();
  if(!snap.exists){ await ref.set({ balance:0, updatedAt: FieldValue.serverTimestamp() }); return 0; }
  return snap.data().balance || 0;
}
async function getWalletBalance(uid){
  try{
    const snap = await db.collection('wallets').doc(uid).get();
    return snap.exists ? (snap.data().balance || 0) : 0;
  }catch(e){ return 0; }
}
async function creditWallet(uid, amount, description, meta={}){
  const ref = db.collection('wallets').doc(uid);
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref);
    const cur = snap.exists ? (snap.data().balance||0) : 0;
    tx.set(ref, { balance: cur + amount, updatedAt: FieldValue.serverTimestamp() }, { merge:true });
  });
  await db.collection('wallets').doc(uid).collection('transactions').add({
    type:'credit', amount, description, ...meta, createdAt: FieldValue.serverTimestamp()
  });
}
async function debitWallet(uid, amount, description, meta={}){
  const ref = db.collection('wallets').doc(uid);
  let ok = false;
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref);
    const cur = snap.exists ? (snap.data().balance||0) : 0;
    if(cur < amount) throw new Error('Insufficient wallet balance');
    tx.set(ref, { balance: cur - amount, updatedAt: FieldValue.serverTimestamp() }, { merge:true });
    ok = true;
  });
  await db.collection('wallets').doc(uid).collection('transactions').add({
    type:'debit', amount, description, ...meta, createdAt: FieldValue.serverTimestamp()
  });
  return ok;
}
// Charges the platform's commission share on a cash trip. Unlike
// debitWallet, this always succeeds and allows the balance to go negative
// — the commission is owed to the platform regardless of whether the
// rider's wallet currently covers it (the rider physically already holds
// the cash fare, so this isn't optional).
async function chargeCashCommission(uid, amount, description, meta={}){
  const ref = db.collection('wallets').doc(uid);
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref);
    const cur = snap.exists ? (snap.data().balance||0) : 0;
    tx.set(ref, { balance: cur - amount, updatedAt: FieldValue.serverTimestamp() }, { merge:true });
  });
  await db.collection('wallets').doc(uid).collection('transactions').add({
    type:'debit', amount, description, ...meta, createdAt: FieldValue.serverTimestamp()
  });
}
async function checkAndAwardReferral(passengerId){
  try{
    const usnap = await db.collection('users').doc(passengerId).get();
    if(!usnap.exists) return;
    const ud = usnap.data();
    if(!ud.referredBy || !referralSettings.enabled || referralSettings.condition !== 'first_trip') return;
    const refSnap = await db.collection('referrals')
      .where('refereeId','==',passengerId).where('status','==','rewarded').limit(1).get();
    if(!refSnap.empty) return; // already awarded
    const pendSnap = await db.collection('referrals')
      .where('refereeId','==',passengerId).where('status','==','pending').limit(1).get();
    if(pendSnap.empty) return;
    const refDoc = pendSnap.docs[0];
    if(referralSettings.autoApprove){
      await db.collection('referrals').doc(refDoc.id).update({ status:'rewarded', awardedAt: FieldValue.serverTimestamp() });
      await creditWallet(ud.referredBy, referralSettings.rewardAmount, `Referral reward — ${ud.name} completed first trip`, { referralId: refDoc.id });
      await notifyUser(ud.referredBy, '🎉 Referral reward received!', `${ud.name} completed their first trip. ₦${referralSettings.rewardAmount} added to your wallet!`);
    } else {
      await db.collection('referrals').doc(refDoc.id).update({ status:'pending_approval' });
      await notifyUser(ADMIN_EMAIL, 'Referral pending approval', `${ud.name} completed first trip. Referral for user ${ud.referredBy}.`);
    }
  }catch(e){ console.warn('referral award error', e); }
}

async function loadRecentDestinations(){
  const box = $('p-recent-destinations');

    const snap = await db.collection('rides').where('passengerId','==',currentUser.uid).get();
    let rides = snap.docs.map(d=>d.data()).filter(r=>r.status==='completed');
    rides.sort((a,b)=> (b.createdAt?.toMillis?.()||0) - (a.createdAt?.toMillis?.()||0));
    const seen = new Set();
    const recents = [];
    for(const r of rides){
      const addr = r.destination?.address;
      if(addr && !seen.has(addr)){ seen.add(addr); recents.push(r.destination); }
      if(recents.length >= 3) break;
    }
    if(recents.length === 0 || !box) return;
    box.innerHTML = `<p class="muted" style="font-size:11px;margin-bottom:6px;">Recent destinations</p>
      <div class="row gap" style="flex-wrap:wrap;">${recents.map((d,i)=>
        `<button class="btn btn-outline btn-sm" data-recent="${i}" style="font-size:12px;">${d.address.length > 22 ? d.address.slice(0,22)+'…' : d.address}</button>`
      ).join('')}</div>`;
    box.querySelectorAll('[data-recent]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        pDestination = recents[parseInt(btn.dataset.recent)];
        $('p-destination').value = pDestination.address;

function pUpdateFare(){
  const warnEl = $('p-geofence-warning');
  warnEl.textContent = '';
  if(!pPickup || !pPickup.address || !pDestination || !pDestination.address){ $('p-fare-card').classList.add('hidden'); return; }

  let pickupOk = isLikelyInServiceArea(pPickup);
  let destOk = isLikelyInServiceArea(pDestination);

  if(!pickupOk){ warnEl.textContent = `Your pickup point looks outside ${serviceArea.name}. Zrider only operates within this area.`; $('p-fare-card').classList.add('hidden'); return; }
  if(!destOk){ warnEl.textContent = `Destination must be within ${serviceArea.name}. Zrider doesn't operate outside this zone yet.`; $('p-fare-card').classList.add('hidden'); return; }

  // Track this call so a later, faster-resolving call (e.g. the user kept
  // editing) can't get clobbered by a slower one finishing after it —
  // important on slow mobile connections where requests can complete out
  // of order.
  const requestToken = ++pFareRequestToken;

  $('p-fare-card').classList.remove('hidden');
  $('p-fare-amount').textContent = '…';
  $('p-fare-distance').textContent = 'Calculating…';

  resolveTripCoordinates(pPickup, pDestination).then(async (outcome)=>{
    if(requestToken !== pFareRequestToken) return; // superseded by a newer request

    if(outcome.error){
      $('p-fare-card').classList.add('hidden');
      warnEl.textContent = outcome.error;
      return;
    }
    if(outcome.ambiguousField){
      // Multiple plausible matches and we won't guess — force the person
      // to pick the right one from the same suggestion dropdown used
      // while typing, instead of silently choosing the top result.
      $('p-fare-card').classList.add('hidden');
      warnEl.textContent = `We found more than one match for your ${outcome.ambiguousField} — please pick the correct one from the list.`;
      if(outcome.showSuggestionsOn && outcome.showSuggestionsOn._zrForceSuggestions){
        outcome.showSuggestionsOn._zrForceSuggestions(outcome.options);
      }
      return;
    }

    const { distKm, durationMin, method } = await resolveRoute(pPickup.lat, pPickup.lng, pDestination.lat, pDestination.lng);
    if(requestToken !== pFareRequestToken) return;
    applyFareBreakdown(distKm, durationMin, method);
  });
}
let pFareRequestToken = 0;

// Makes sure both pPickup and pDestination end up with real coordinates
// before we ever attempt routing. Only resolves whichever side is
// actually missing coordinates — a location that already came from GPS
// or an explicit suggestion tap is never silently re-geocoded (and
// potentially replaced with a less precise match). When an address needs
// geocoding and multiple candidates come back, this does NOT auto-pick
// one — it reports back so the caller can force an explicit choice.
async function resolveTripCoordinates(pickup, destination){
  async function resolveSide(point, inputEl){
    if(point.lat != null && point.lng != null) return { ok:true };
    if(typeof navigator !== 'undefined' && navigator.onLine === false){
      // Fully offline — fall back to known locality keywords rather than
      // failing outright, since there's no network to search with anyway.
      const guess = bestKnownPositionForAddress(point.address);
      if(guess){ point.lat = guess.lat; point.lng = guess.lng; point._approx = true; return { ok:true }; }
      return { ok:false, error: `You appear to be offline and "${point.address}" isn't a recognized area. Reconnect and try again.` };
    }
    const results = await searchAddress(point.address);
    if(results.length === 0){
      // No hits at all from Nominatim — last resort, try our own curated
      // LGA/locality keyword list before giving up entirely.
      const guess = bestKnownPositionForAddress(point.address);
      if(guess){ point.lat = guess.lat; point.lng = guess.lng; point._approx = true; return { ok:true }; }
      return { ok:false, error: `We couldn't find "${point.address}". Please check the spelling or try a nearby landmark.` };
    }
    if(results.length === 1){
      point.lat = results[0].lat; point.lng = results[0].lng;
      return { ok:true };
    }
    // 2+ candidates — genuinely ambiguous, require an explicit choice.
    return { ok:false, ambiguous:true, options: results, inputEl };
  }

  const [pRes, dRes] = await Promise.all([
    resolveSide(pickup, $('p-pickup')),
    resolveSide(destination, $('p-destination'))
  ]);
  if(!pRes.ok){
    if(pRes.ambiguous) return { ambiguousField:'pickup', options:pRes.options, showSuggestionsOn:pRes.inputEl };
    return { error: pRes.error };
  }
  if(!dRes.ok){
    if(dRes.ambiguous) return { ambiguousField:'destination', options:dRes.options, showSuggestionsOn:dRes.inputEl };
    return { error: dRes.error };
  }
  return { ok:true };
}

// Real road-network distance + travel time via OSRM's free public routing
// server (no API key, no billing). Longitude,latitude order and the
// 'driving' profile are required by OSRM and verified below. Retries once
// on failure before falling back to a corrected straight-line estimate,
// which is clearly flagged via the returned `method` so the UI can mark
// the fare as approximate rather than presenting it as exact.
async function fetchOSRMRoute(lat1, lng1, lat2, lng2){
  // OSRM's coordinate order is lng,lat (the opposite of how we store
  // lat/lng everywhere else) — get this backwards and you silently get a
  // route between the wrong points, which is a classic source of "distance
  // is wrong" bugs. Assembled explicitly here, once, so it can't drift.
  const url = `https://router.project-osrm.org/route/v1/driving/${lng1},${lat1};${lng2},${lat2}?overview=false&alternatives=false&steps=false`;
  const res = await fetchWithTimeout(url, {}, 8000);
  if(!res.ok) throw new Error('OSRM HTTP ' + res.status);
  const data = await res.json();
  if(!data || data.code !== 'Ok' || !Array.isArray(data.routes) || !data.routes[0]){
    throw new Error('OSRM returned no usable route');
  }
  const route = data.routes[0];
  if(!isFinite(route.distance) || !isFinite(route.duration) || route.distance <= 0){
    throw new Error('OSRM route had invalid distance/duration');
  }
  return { distKm: Math.max(0.3, route.distance / 1000), durationMin: Math.max(2, route.duration / 60) };
}

async function resolveRoute(lat1, lng1, lat2, lng2){
  // Sanity-check coordinate ranges up front — catches an accidental
  // lat/lng swap immediately instead of silently producing a nonsense
  // route halfway around the world.
  const coordsLookSane = Math.abs(lat1) <= 90 && Math.abs(lat2) <= 90 && Math.abs(lng1) <= 180 && Math.abs(lng2) <= 180;
  if(!coordsLookSane){
    console.warn('resolveRoute: coordinates out of range, check for a lat/lng swap', {lat1,lng1,lat2,lng2});
    return { distKm: 2.5, durationMin: 8, method:'estimate' };
  }

  const cacheKey = [lat1,lng1,lat2,lng2].map(n=>n.toFixed(4)).join(',');
  const cached = cacheGet(_routeCache, cacheKey, ROUTE_CACHE_TTL_MS);
  if(cached) return cached;

  if(typeof navigator === 'undefined' || navigator.onLine !== false){
    for(let attempt = 1; attempt <= 2; attempt++){
      try{
        const result = await fetchOSRMRoute(lat1, lng1, lat2, lng2);
        result.method = 'route';
        cacheSet(_routeCache, cacheKey, result);
        return result;
      }catch(e){
        if(attempt === 1){ await sleep(600); continue; } // one automatic retry before giving up
        // both attempts failed — fall through to the straight-line fallback below
      }
    }
  }

  // Last resort only: straight-line distance, corrected upward since real
  // roads are never perfectly straight, clearly flagged as an estimate.
  const straightKm = haversineKm(lat1, lng1, lat2, lng2);
  const roadKm = Math.max(0.3, straightKm * 1.35);
  const result = { distKm: roadKm, durationMin: roadKm * 3.2, method:'estimate' };
  cacheSet(_routeCache, cacheKey, result); // cache briefly too, avoids hammering during an outage
  return result;
}

function applyFareBreakdown(distKm, durationMin, method){
  const breakdown = computeFareBreakdown(distKm, durationMin);
  const isEstimate = method === 'estimate';
  const dc = $('p-fare-distance'); if(dc) dc.textContent = fmtKm(distKm) + (isEstimate ? ' (est.)' : '');
  const tc = $('p-fare-time'); if(tc) tc.textContent = '~' + breakdown.estMinutes + ' min';
  const bc = $('p-fare-base'); if(bc) bc.textContent = fmtNaira(breakdown.base);
  const dcc = $('p-fare-distcharge'); if(dcc) dcc.textContent = fmtNaira(breakdown.distCharge);
  const tcc = $('p-fare-timecharge'); if(tcc) tcc.textContent = fmtNaira(breakdown.timeCharge);
  const ac = $('p-fare-amount'); if(ac) ac.textContent = fmtNaira(breakdown.total);
  const note = $('p-fare-estimate-note'); if(note) note.classList.toggle('hidden', !isEstimate);
  const card = $('p-fare-card');
  if(card){
    card.classList.remove('hidden');
    card.dataset.distKm = distKm;
    card.dataset.fare = breakdown.total;
    card.dataset.isEstimate = isEstimate ? '1' : '0';
  }
}

// Deep last-resort fallback — only used when we're offline or Nominatim
// returns zero results, so there's genuinely no other way to get any
// coordinate at all. Reuses serviceZones/areaKeywords and the curated
// LOCALITY_POSITIONS so it always matches whatever coverage area is
// currently configured, and prefers the most specific (longest) matching
// keyword instead of the first one found.
function bestKnownPositionForAddress(address){
  const a = (address || '').toLowerCase();
  let best = null;
  for(const z of serviceZones){
    const keywords = z.areaKeywords && z.areaKeywords.length ? z.areaKeywords : [z.name];
    for(const k of keywords){
      const kLower = String(k).toLowerCase();
      if(a.includes(kLower) && (!best || kLower.length > best.kLower.length)){
        best = { kLower, z };
      }
    }
  }
  if(!best) return null;
  return LOCALITY_POSITIONS[best.kLower] || keywordFallbackPosition(best.kLower, best.z);
}
function estimateDistFromAddresses(addr1, addr2){
  const p = bestKnownPositionForAddress(addr1), d = bestKnownPositionForAddress(addr2);
  if(p && d) return Math.max(0.5, haversineKm(p.lat, p.lng, d.lat, d.lng));
  return 2.5; // last-resort default if both addresses are unrecognized
}

async function pRequestRide(){
  if(!pPickup || !pDestination) { toast('Set your pickup and destination first.', 'err'); return; }
  const distKm = parseFloat($('p-fare-card').dataset.distKm);
  const fare = parseFloat($('p-fare-card').dataset.fare);
  const fareIsEstimate = $('p-fare-card').dataset.isEstimate === '1';
  if(!isFinite(distKm) || !isFinite(fare) || fare <= 0){
    toast('Still calculating your fare — try again in a moment.', 'err');
    return;
  }
  const btn = $('p-request-ride'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const paymentMethod = $('p-pay-method').value;

  try{
    // Wallet payment: check balance first
    if(paymentMethod === 'wallet'){
      const bal = await getWalletBalance(currentUser.uid);
      currentWalletBalance = bal;
      if(bal < fare){
        toast(`Insufficient wallet balance. You have ${fmtNaira(bal)}, need ${fmtNaira(fare)}.`, 'err');
        btn.disabled = false; btn.textContent = 'Request bike';
        openDepositModal();
        return;
      }
      // Debit wallet immediately
      await debitWallet(currentUser.uid, fare, `Ride payment — ${pPickup.address} → ${pDestination.address}`, { method:'wallet' });
      currentWalletBalance = bal - fare;
    }

    const rideRef = await db.collection('rides').add({
      passengerId: currentUser.uid,
      passengerName: currentUserDoc.name,
      passengerPhone: currentUserDoc.phone || '',
      riderId: null,
      pickup: pPickup,
      destination: pDestination,
      distanceKm: distKm,
      fare: fare,
      fareIsEstimate: fareIsEstimate,
      paymentMethod,
      paymentStatus: paymentMethod === 'cash' ? 'pending_cash' : paymentMethod === 'wallet' ? 'paid_wallet' : 'pending_online',
      status: 'searching',
      passengerActive: true,
      riderActive: false,
      passengerRated: false,
      createdAt: FieldValue.serverTimestamp()
    });

    if(paymentMethod === 'card'){
      const ok = await collectPaystackPayment(fare, async (ref)=>{
        await db.collection('rides').doc(rideRef.id).update({ paymentStatus:'paid_online', paystackRef: ref });
      });
      if(!ok){ /* payment failed/cancelled */ }
    }
    toast('Looking for a nearby rider…', 'ok');
  }catch(e){
    console.error('Ride request failed:', e);
    toast(`Could not request a ride: ${e.message || e.code || 'unknown error'}`, 'err');
    btn.disabled = false; btn.textContent = 'Request bike';
  }
}

function pSheetSearching(sheet, ride){
  sheet.appendChild(clone('tpl-p-searching'));
  const startMs = ride.createdAt?.toMillis?.() || Date.now();
  const elapsedEl = $('p-search-elapsed');
  function tick(){
    const secs = Math.max(0, Math.floor((Date.now() - startMs)/1000));
    const m = Math.floor(secs/60).toString().padStart(2,'0');
    const s = (secs%60).toString().padStart(2,'0');
    if(elapsedEl) elapsedEl.textContent = `${m}:${s}`;
  }
  tick();
  pSearchTimerInterval = setInterval(tick, 1000);
  $('p-cancel-search').addEventListener('click', ()=>{
    promptCancelReason(CANCEL_REASONS_PASSENGER, async (reason)=>{
      await db.collection('rides').doc(ride.id).update({ status:'cancelled', passengerActive:true, cancelledBy:'passenger', cancelReason:reason });
      toast('Ride request cancelled.');
    });
  });
}
